<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>契約書自動作成</title>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.2.0/dist/pizzip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
  :root{
    --bg:#F7F8FA; --surface:#ffffff; --ink:#111827; --muted:#6B7280;
    --line:#E4E7EC; --brand:#3B6EF0; --brand-ink:#2f5de0; --brand-soft:#EEF2FF;
    --accent:#3B6EF0; --accent-soft:#EEF2FF; --mask:#FEF3C7; --mask-line:#D9A441;
    --danger:#EF4444; --radius:10px; --shadow:0 1px 4px rgba(17,24,39,.07),0 8px 24px rgba(17,24,39,.05);
    --text-muted:#9CA3AF; --tag-bg:#F3F4F6; --success:#10B981;
    --gutter:28px; --header-h:65px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Noto Sans JP','Inter',"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,"Segoe UI",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased; font-size:14px;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header.top{
    flex:none; position:sticky; top:0; z-index:100; background:var(--surface);
    border-bottom:1px solid var(--line);
  }
  .top-inner{width:100%; margin:0; padding:16px var(--gutter); display:flex; align-items:center; gap:12px}
  .logo{display:flex; align-items:center; gap:12px; cursor:pointer}
  .logo .badge{width:36px;height:36px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;flex:none}
  .logo .badge svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .logo .app-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:normal;margin:0 20px 0 0;white-space:nowrap;line-height:1}
  .top-spacer{flex:1}
  .link-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:8px 14px;border-radius:8px;font-family:inherit;font-weight:600}
  .link-btn:hover{background:var(--brand-soft);color:var(--brand-ink)}
  /* main#app：ダッシュボード（home）は高さ固定で内部スクロール、それ以外は通常ページスクロール */
  main#app{flex:1; min-height:0; overflow-y:auto}
  main#app.fill{overflow:hidden; display:flex; flex-direction:column}
  .dash-top{flex:none; padding:16px var(--gutter) 0}
  .wrap{width:100%; margin:0; padding:var(--gutter) var(--gutter) 80px}
  .crumbs{color:var(--muted); font-size:13px; margin-bottom:18px}
  .crumbs b{color:var(--ink)}
  h1{font-size:26px; margin:0; letter-spacing:.01em}
  /* ページ見出し行：ボタンの有無に関わらずタイトルの上端位置をそろえるため flex-start で統一 */
  .page-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px}
  .page-head h1{margin:0}
  h2{font-size:19px; margin:0 0 14px}
  .lead{color:var(--muted); font-size:14px; margin:0 0 26px} /* 文字サイズを14pxに小さく調整 */
  .grid{display:grid; gap:18px}
  .grid.cards{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow)}
  .card.click{cursor:pointer; transition:transform .12s ease, box-shadow .12s ease}
  .card.click:hover{transform:translateY(-2px); box-shadow:0 4px 8px rgba(30,32,40,.08),0 14px 34px rgba(30,32,40,.09)}
  .card .ico{width:44px;height:44px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-size:22px;margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:17px}
  .card p{margin:0;color:var(--muted);font-size:14px}
  .btn{
    display:inline-flex;align-items:center;gap:8px;justify-content:center;
    background:var(--brand);color:#fff;border:none;border-radius:8px;
    padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s
  }
  .btn:hover{background:var(--brand-ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--brand-ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--brand-soft)}
  .btn.accent{background:var(--accent)} .btn.accent:hover{filter:brightness(.94)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid #FECACA}
  .btn.danger:hover{background:#FEF2F2}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .row.end{justify-content:flex-end}
  .field{margin-bottom:18px}
  label.lbl{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
  /* 「フォーマット名」ラベルと「項目設定」見出しなど、フォーム内の小見出しをそろえるための共通クラス */
  .section-heading{display:block;font-weight:600;font-size:14px;margin:0 0 6px;color:var(--ink)}
  .hint{color:var(--muted);font-size:13px;margin-top:4px}
  input[type=text],textarea,select{
    width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:15px;font-family:inherit;color:var(--ink)
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  textarea{resize:vertical;min-height:120px}
  input::placeholder,textarea::placeholder{color:var(--text-muted);opacity:1}
  .dropzone{
    border:2px dashed var(--line);border-radius:var(--radius);padding:34px;text-align:center;
    background:#F9FAFB;cursor:pointer;transition:.12s;color:var(--muted)
  }
  .dropzone:hover,.dropzone.drag{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink)}
  .dropzone .big{font-size:34px;margin-bottom:6px}
  .split{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start}
  @media(max-width:820px){.split{grid-template-columns:1fr}}
  /* 契約書作成画面：左サイドバー（フォーマット選択）＋右作業エリア（PMGのlayout/leftと同じ構造・サイズ感） */
  .make-shell{display:grid;grid-template-columns:320px 1fr;flex:1;min-height:0;width:100%;overflow:hidden}
  @media(max-width:820px){.make-shell{grid-template-columns:1fr;height:auto;overflow:visible}}
  .make-sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%;overflow:hidden;width:320px;min-width:320px}
  @media(max-width:820px){.make-sidebar{width:100%;min-width:0;height:auto;border-right:none;border-bottom:1px solid var(--line)}}
  .make-sidebar-head{padding:10px 16px 6px;flex:none;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}
  .make-sidebar-list{flex:1;overflow-y:auto;padding:0 8px 8px}
  .side-tpl-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:.12s}
  .side-tpl-item:hover{background:var(--bg)}
  .side-tpl-item.sel{background:var(--brand-soft);box-shadow:inset 0 0 0 1.5px var(--brand)}
  .side-tpl-item .tpl-ico{width:32px;height:32px;font-size:10px;border-radius:8px;flex:none}
  .side-tpl-item .tpl-meta .nm{font-size:13.5px}
  .side-tpl-item .tpl-meta .sub{font-size:11.5px}
  .make-workarea{min-height:320px;height:100%;overflow-y:auto;padding:20px var(--gutter) 40px}
  @media(max-width:820px){.make-workarea{height:auto;overflow:visible}}
  .make-workarea .empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius)}
  .preview-pane{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .pane-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:#F9FAFB}
  .pane-head .t{font-weight:600;font-size:14px}
  .docx-preview{padding:22px 26px;max-height:520px;overflow:auto;font-size:14.5px}
  .docx-preview p{margin:0 0 10px}
  .docx-preview table{border-collapse:collapse;margin:8px 0}
  .docx-preview td,.docx-preview th{border:1px solid var(--line);padding:4px 8px}
  .mask{background:var(--mask);border-bottom:2px solid var(--mask-line);border-radius:3px;padding:0 2px;cursor:pointer}
  .mask:hover{filter:brightness(.96)}
  /* マスクモード切替（鉛筆／消しゴム） */
  .mask-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .mask-toggle button{border:none;background:#fff;padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .mask-toggle button+button{border-left:1px solid var(--line)}
  .mask-toggle button.on{background:var(--brand);color:#fff}
  .mask-toggle button.on.erase{background:var(--accent)}
  /* 鉛筆モード：プレビュー上で選択しやすいカーソル */
  .docx-preview.mode-add{cursor:text}
  .docx-preview.mode-erase .mask{cursor:pointer;outline:1px dashed var(--danger);outline-offset:1px}
  .docx-preview.mode-erase .mask:hover{background:#fbeae8;border-bottom-color:var(--danger)}
  .xlsx-preview{padding:14px;max-height:520px;overflow:auto}
  .xlsx-preview .sheetname{font-size:12px;font-weight:700;color:var(--muted);margin:10px 4px 4px;text-transform:uppercase;letter-spacing:.04em}
  .xlsx-preview table{border-collapse:collapse;font-size:13px}
  .xlsx-preview td{border:1px solid var(--line);padding:3px 8px;min-width:46px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .xlsx-preview td:empty{min-height:20px}
  .xlsx-preview td.picked{background:var(--mask);outline:2px solid var(--mask-line);outline-offset:-2px}
  .xlsx-preview td:hover{background:var(--brand-soft)}
  .var-list{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;padding-right:4px}
  .var-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}
  .var-item .orig{font-size:12px;color:var(--muted);margin-bottom:8px;word-break:break-all}
  .var-item .orig b{background:var(--mask);color:var(--ink);padding:0 3px;border-radius:3px}
  .var-item .prop-row{display:flex;gap:8px;align-items:center}
  .var-item input{flex:1}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:6px;border-radius:8px}
  .icon-btn:hover{background:#F3F4F6;color:var(--danger)}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px}
  .tpl-item{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .tpl-item:hover{border-color:var(--brand);transform:translateY(-1px)}
  .tpl-item.sel{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .tpl-ico{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff}
  .tpl-ico.docx{background:#2b579a}.tpl-ico.xlsx{background:#217346}
  .tpl-meta{flex:1}.tpl-meta .nm{font-weight:600}.tpl-meta .sub{font-size:13px;color:var(--muted)}
  .pill{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--brand-soft);color:var(--brand-ink);font-weight:600}
  .tabs{display:flex;gap:6px;background:#F3F4F6;padding:5px;border-radius:12px;width:max-content;margin-bottom:22px}
  .tabs button{border:none;background:none;padding:9px 18px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted)}
  .tabs button.on{background:#fff;color:var(--brand-ink);box-shadow:var(--shadow)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.err{background:var(--danger)}
  .backdrop{position:fixed;inset:0;background:rgba(20,22,28,.45);display:none;place-items:center;z-index:150;padding:20px}
  .backdrop.show{display:grid}
  .modal{background:var(--surface);border-radius:16px;max-width:640px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{padding:20px 24px 6px}.modal-head h2{margin:0}
  .modal-body{padding:8px 24px}
  .modal-foot{padding:16px 24px 22px;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:linear-gradient(transparent,var(--surface) 30%)}
  .confirm-row{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .confirm-row .k{font-size:13px;color:var(--muted);font-weight:600}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-overlay{position:fixed;inset:0;background:rgba(245,244,240,.7);backdrop-filter:blur(2px);display:none;place-items:center;z-index:180}
  .loading-overlay.show{display:grid}
  .loading-box{background:#fff;padding:24px 30px;border-radius:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;font-weight:600}
  .loading-box .spinner{border-color:var(--brand-soft);border-top-color:var(--brand)}
  .warnbox{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px}
  .thumb-preview{margin-top:12px;display:flex;justify-content:center}
  .thumb-preview img{max-height:110px;border-radius:6px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  /* マスクの項目名ツールチップ（ネイティブtitleは表示が遅いため自前実装） */
  .mini-tooltip{position:fixed;z-index:9999;background:var(--ink);color:#fff;font-size:12px;font-weight:600;
    padding:5px 9px;border-radius:6px;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);
    transform:translate(-50%,-100%);margin-top:-10px;display:none}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="logo" onclick="go('home')">
      <span class="badge">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      </span>
      <h1 class="app-title">契約書自動作成</h1>
    </div>
    <div class="top-spacer"></div>
    <button class="link-btn" onclick="go('templates')">🗂 フォーマット管理</button>
  </div>
</header>
<main id="app"></main>
<div class="loading-overlay" id="loading"><div class="loading-box"><span class="spinner"></span><span id="loadingText">AIが処理しています…</span></div></div>
<div class="backdrop" id="backdrop"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   GAS Web App URL（バックグラウンドに固定）
   ※デプロイ時はここに /exec のURLを設定してください。
     UI上には表示されず、利用者からは見えません。
============================================================ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxy3OqnHHirPXX07VgX998x5fy5N_xbJ97Nw12ZgOBe-rHJbRLWNwbhyHmzrtq9RVn1Q/exec';
/* ============================================================
   ストレージ層（localStorageを試し、使えなければメモリ保持）
   ※自分のサーバー/GASにホストすれば永続化されます
============================================================ */
const Store = (() => {
  let mem = {};
  let ok = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true; } catch(e){ ok = false; }
  return {
    get(k){ try { return ok ? JSON.parse(localStorage.getItem(k) || 'null') : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { if(ok) localStorage.setItem(k, JSON.stringify(v)); else mem[k]=v; } catch(e){ mem[k]=v; } },
    persistent: ok
  };
})();
/* ============================================================
   アプリ状態
============================================================ */
const state = {
  view: 'home',
  templates: Store.get('templates') || [],
  // フォーマット作成中の一時データ
  draft: null,
  // 契約書作成中の一時データ
  make: null
};
function saveTemplates(){ Store.set('templates', state.templates); }
function uid(){ return 'k'+Math.random().toString(36).slice(2,9); }
/* ============================================================
   ユーティリティ
============================================================ */
function toast(msg, isErr){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isErr?' err':''); setTimeout(()=>t.className='toast',2600); }
function loading(on, text){ const l=document.getElementById('loading'); document.getElementById('loadingText').textContent=text||'AIが処理しています…'; l.classList.toggle('show',!!on); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fileToBase64(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);}); }
function abToBase64(ab){ let bin='';const b=new Uint8Array(ab),ck=0x8000; for(let i=0;i<b.length;i+=ck) bin+=String.fromCharCode.apply(null,b.subarray(i,i+ck)); return btoa(bin); }
function base64ToAb(b64){ const bin=atob(b64),len=bin.length,bytes=new Uint8Array(len); for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }
function download(blob, filename){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),4000); }
/* ============================================================
   AI呼び出し（すべてGAS Web App経由でGeminiを実行）
============================================================ */
function gasReady(){ return GAS_URL && !/PUT_YOUR_DEPLOY_ID_HERE/.test(GAS_URL); }
async function callAI(action, payload){
  if(!gasReady()){ throw new Error('AI接続先が未設定です。管理者にお問い合わせください。'); }
  const res = await fetch(GAS_URL, {
    method:'POST',
    // text/plain にすることでCORSプリフライトを回避（GAS Web Appの定石）
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  });
  const data = await res.json();
  if(data.error) throw new Error('AIエラー: '+data.error);
  return data;
}
/* ============================================================
   ルーター
============================================================ */
function go(view, arg){
  state.view=view; render(view, arg);
  const app=document.getElementById('app');
  if(app) app.scrollTop=0;
}
function render(view, arg){
  const app=document.getElementById('app');
  // home（契約書作成ダッシュボード）は高さ固定＋内部スクロール、それ以外は通常ページスクロール
  app.classList.toggle('fill', view==='home');
  app.classList.toggle('wrap', view!=='home');
  app.innerHTML='';
  ({ home:viewHome, templates:viewTemplates,
     templateNew:viewTemplateNew }[view]||viewHome)(app, arg);
}
/* ============================================================
   画面：ホーム
============================================================ */
function viewHome(app){
  const warn = !gasReady() ? '<div class="warnbox" style="margin:0 0 12px">⚠ AI接続先が未設定です。手動入力機能はそのままご利用いただけます。</div>' : '';
  const persistWarn = !Store.persistent ? '<div class="hint" style="margin:0 0 12px">※このプレビュー環境ではブラウザ保存が使えないため、リロードでフォーマットが消えます。ご自身のサーバーやGASに設置すると保存されます。</div>' : '';
  app.innerHTML = `
    ${(warn||persistWarn) ? `<div class="dash-top">${warn}${persistWarn}</div>` : ''}
    <div class="make-shell">
      <aside class="make-sidebar">
        <div class="make-sidebar-head">
          <span>フォーマット一覧</span>
          <span style="color:var(--text-muted)">${state.templates.length}件</span>
        </div>
        <div class="make-sidebar-list" id="sideTplList"></div>
      </aside>
      <section class="make-workarea" id="makeWorkarea"></section>
    </div>
  `;
  renderSideTplList();
  renderMakeWorkarea();
}
/* ---- 左サイドバー：フォーマット一覧 ---- */
function renderSideTplList(){
  const list=document.getElementById('sideTplList');
  if(!list) return;

async function startTemplateEdit(id){
  const t=state.templates.find(x=>x.id===id);
  if(!t){ toast('フォーマットが見つかりません', true); return; }
  const d={ name:t.name, fileType:t.fileType, fileBase64:t.fileBase64, previewHtml:'', workbook:null,
    variables:t.variables.map(v=>({ key:uid(), propName:v.propName, originalText:v.originalText,
      occurrence:(v.occurrence!=null?v.occurrence:0), sheet:v.sheet||undefined, addr:v.addr||undefined })),
    maskMode:'add', editId:t.id };
  state.draft=d;
  try{
    loading(true,'フォーマットを読み込み中…');
    const ab=base64ToAb(t.fileBase64);
    if(t.fileType==='docx'){
      const result=await mammoth.convertToHtml({arrayBuffer:ab});
      d.previewHtml=result.value;
    }else{
      d.workbook=XLSX.read(ab,{type:'array'});
    }
    loading(false);
    go('templateNew');
  }catch(e){ loading(false); toast('読み込みに失敗しました: '+e.message, true); }
}

async function handleTemplateFile(file){
  const d=state.draft;
  const isDocx = /\.docx$/i.test(file.name);
  const isXlsx = /\.xlsx$/i.test(file.name);
  if(!isDocx && !isXlsx){ toast('Word（.docx）または Excel（.xlsx）を選択してください', true); return; }
  d.fileType = isDocx ? 'docx' : 'xlsx';
  if(!d.name.trim()) {
    d.name = file.name.replace(/\.[^/.]+$/, "");
    const tn=document.getElementById('tplName'); if(tn) tn.value=d.name;
  }
  try{
    loading(true, 'ファイルを解析中…');
    d.fileBase64 = await fileToBase64(file);
    d.variables = [];
    const ab = base64ToAb(d.fileBase64);
    if(isDocx){
      const result = await mammoth.convertToHtml({arrayBuffer: ab});
      d.previewHtml = result.value;
    } else {
      d.workbook = XLSX.read(ab, {type: 'array'});
    }
    loading(false);
    const ua=document.getElementById('uploadArea'); if(ua) ua.style.display='none';
    buildMaskArea();
  }catch(e){ loading(false); toast('ファイルの読み込みに失敗しました: '+e.message, true); }
}

/* ---- docx マスク ---- */
// マスクした「その出現位置」だけをハイライトする（同一文言の他の箇所は色付けしない）
function renderDocxPreview(body){
  const d=state.draft;
  body.innerHTML=d.previewHtml;
  // テキストノードを文書順に集め、各ノードの開始オフセットを記録
  const walker=document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
  const nodes=[]; let n; while((n=walker.nextNode())) nodes.push(n);
  const starts=[]; let acc=0;
  nodes.forEach(nd=>{ starts.push(acc); acc+=nd.nodeValue.length; });
  const full=nodes.map(nd=>nd.nodeValue).join('');
  // 各変数について、対象の出現位置[start,end)を求め、ノードごとに切り出して包む
  const pieceMap=new Map();
  d.variables.forEach(v=>{
    const positions=allIndexOf(full, v.originalText);
    const occ=(v.occurrence!=null?v.occurrence:0);
    const start=positions[occ];
    if(start==null) return; // 見つからなければ色付けしない
    const end=start+v.originalText.length;
    for(let i=0;i<nodes.length;i++){
      const ns=starts[i], ne=ns+nodes[i].nodeValue.length;
      const s=Math.max(start,ns), e=Math.min(end,ne);
      if(s<e){
        if(!pieceMap.has(nodes[i])) pieceMap.set(nodes[i],[]);
        pieceMap.get(nodes[i]).push({s:s-ns,e:e-ns,key:v.key});
      }
    }
  });
  pieceMap.forEach((pieces,node)=>wrapNodePieces(node,pieces));
}
// 1つのテキストノード内の複数区間をまとめて <span class="mask"> で包む
function wrapNodePieces(node, pieces){
  pieces.sort((a,b)=>a.s-b.s);
  const text=node.nodeValue;
  const frag=document.createDocumentFragment();
  let cur=0;
  pieces.forEach(p=>{
    if(p.s<cur) return;            // 区間が重なる場合はスキップ
    if(p.s>cur) frag.appendChild(document.createTextNode(text.slice(cur,p.s)));
    const span=document.createElement('span'); span.className='mask'; span.dataset.key=p.key;
    span.textContent=text.slice(p.s,p.e); frag.appendChild(span);
    cur=p.e;
  });
  if(cur<text.length) frag.appendChild(document.createTextNode(text.slice(cur)));
  node.parentNode.replaceChild(frag,node);
}
// 鉛筆モードで選択終了時に呼ばれる。選択が無ければ静かに何もしない。
function tryAddDocxMaskFromSelection(){
  const body=document.getElementById('previewBody');
  if(!body) return;
  const sel=window.getSelection();
  if(!sel || !sel.rangeCount) return;
  const raw=sel.toString();
  if(!raw || !raw.trim()) return;                    // 選択なし → 無視
  const range=sel.getRangeAt(0);
  if(!body.contains(range.startContainer)) return;   // プレビュー外 → 無視
  // 既存マスクの内側だけを選択した場合は追加しない（除去はクリックで行う）
  const text=raw.trim();
  const full=previewFullText(body);
  const selStart=globalStartOffset(body, range);
  let matchStart = selStart>=0 ? full.indexOf(text, Math.max(0, selStart)) : -1;
  if(matchStart<0) matchStart = full.indexOf(text);
  if(matchStart<0){ sel.removeAllRanges(); return; }
  const occurrence=countOcc(full, text, matchStart);
  if(state.draft.variables.some(v=>v.originalText===text && v.occurrence===occurrence)){
    sel.removeAllRanges();
    toast('その箇所はすでにマスク済みです', true);
    return;
  }
  state.draft.variables.push({ key:uid(), originalText:text, occurrence, propName:'' });
  sel.removeAllRanges();
  renderDocxPreview(body);
  applyMaskModeUI();
  refreshVarList();
}
// プレビュー内の全テキストを文書順に連結
function previewFullText(root){
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let s='', n; while((n=walker.nextNode())) s+=n.nodeValue; return s;
}
// 選択開始位置をプレビュー全体の文字オフセットに変換
function globalStartOffset(root, range){
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let offset=0, node;
  while((node=walker.nextNode())){
    if(node===range.startContainer) return offset + range.startOffset;
    offset += node.nodeValue.length;
  }
  return -1;
}
// endPosより前にneedleが何回出現するか（＝0始まりの出現番号）
function countOcc(hay, needle, endPos){
  let c=0, i=0;
  while((i=hay.indexOf(needle,i))>=0 && i<endPos){ c++; i+=needle.length; }
  return c;
}
function allIndexOf(hay, needle){ const r=[]; if(!needle) return r; let i=0; while((i=hay.indexOf(needle,i))>=0){ r.push(i); i+=needle.length; } return r; }
/* ---- xlsx マスク ---- */
function renderXlsxPreview(body){
  const d=state.draft;
  body.innerHTML='';
  d.workbook.SheetNames.forEach(sn=>{
    const ws=d.workbook.Sheets[sn]; if(!ws['!ref']) return;
    const range=XLSX.utils.decode_range(ws['!ref']);
    const maxR=Math.min(range.e.r, range.s.r+199);
    const label=document.createElement('div'); label.className='sheetname'; label.textContent=sn; body.appendChild(label);
    const tbl=document.createElement('table');
    for(let r=range.s.r;r<=maxR;r++){
      const tr=document.createElement('tr');
      for(let c=range.s.c;c<=range.e.c;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        const cell=ws[addr];
        const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
        const td=document.createElement('td');
        td.textContent=val; td.title=val;
        td.dataset.sheet=sn; td.dataset.addr=addr;
        if(d.variables.some(v=>v.sheet===sn && v.addr===addr)) td.classList.add('picked');
        if(val!=='' && val!=null){
          td.onclick=()=>toggleCell(sn,addr,String(val),td);
        }
        tr.appendChild(td);
      }
      tbl.appendChild(tr);
    }
    body.appendChild(tbl);
  });
}
function toggleCell(sheet,addr,val,td){
  const d=state.draft;
  const i=d.variables.findIndex(v=>v.sheet===sheet && v.addr===addr);
  const mode=d.maskMode||'add';
  if(mode==='erase'){
    // 消しゴム：マスク済みのみ解除、未マスクは無視
    if(i>=0){ d.variables.splice(i,1); td.classList.remove('picked'); refreshVarList(); }
    return;
  }
  // 鉛筆（追加）：未マスクなら追加。既にマスク済みならそのまま。
  if(i<0){ d.variables.push({ key:uid(), sheet, addr, originalText:val, propName:'' }); td.classList.add('picked'); refreshVarList(); }
}
/* ---- 変数リスト ---- */
function removeVar(key){
  const d=state.draft;
  d.variables=d.variables.filter(v=>v.key!==key);
  if(d.fileType==='docx') renderDocxPreview(document.getElementById('previewBody'));
  else renderXlsxPreview(document.getElementById('previewBody'));
  refreshVarList();
}
function refreshVarList(){
  const d=state.draft;
  document.getElementById('varCount').textContent=d.variables.length;
  const list=document.getElementById('varList');
  if(!d.variables.length){ list.innerHTML='<div class="empty">左側でマスクした部分がここに並びます。</div>'; return; }
  // docxは同一文言の総出現数を数えて「何箇所目か」を表示するための全文
  let fullForCount='';
  if(d.fileType==='docx'){ const b=document.getElementById('previewBody'); if(b) fullForCount=previewFullText(b); }
  list.innerHTML='';
  d.variables.forEach(v=>{
    const item=document.createElement('div'); item.className='var-item';
    const loc=v.addr?` <span style="color:var(--brand)">[${v.sheet}!${v.addr}]</span>`:'';
    let occBadge='';
    if(d.fileType==='docx'){
      const total=allIndexOf(fullForCount, v.originalText).length;
      if(total>1) occBadge=` <span class="pill" style="background:var(--accent-soft);color:var(--brand-ink)">${(v.occurrence??0)+1}/${total}箇所目</span>`;
    }
    item.innerHTML=`
      <div class="orig">元テキスト:${loc}${occBadge} <b>${esc(v.originalText.slice(0,60))}</b></div>
      <div class="prop-row">
        <input type="text" placeholder="項目名（例：甲の会社名）" value="${esc(v.propName)}">
        <button class="icon-btn" title="削除">✕</button>
      </div>`;
    item.querySelector('input').oninput=e=>{ v.propName=e.target.value; refreshMaskTitles(); };
    item.querySelector('.icon-btn').onclick=()=>removeVar(v.key);
    list.appendChild(item);
  });
  refreshMaskTitles();
}
// マスク済み部分にカーソルを合わせたときに項目名をツールチップで表示する（自前実装＝表示が速い）
function refreshMaskTitles(){
  const d=state.draft;
  const body=document.getElementById('previewBody');
  if(!body) return;
  if(d.fileType==='docx'){
    body.querySelectorAll('.mask').forEach(span=>{
      const v=d.variables.find(x=>x.key===span.dataset.key);
      span.removeAttribute('title');
      span.dataset.tip = (v && v.propName) ? v.propName : '項目名未設定';
    });
  }else{
    body.querySelectorAll('td').forEach(td=>{
      if(td.classList.contains('picked')){
        const v=d.variables.find(x=>x.sheet===td.dataset.sheet && x.addr===td.dataset.addr);
        td.removeAttribute('title');
        td.dataset.tip = (v && v.propName) ? `項目名: ${v.propName}` : '項目名未設定';
      }else{
        delete td.dataset.tip;
        td.title = td.textContent;
      }
    });
  }
}
// 自前ツールチップ（遅延なしで即表示。マスク／マスク済みセルにのみ反応。対象要素の上に固定表示）
(function initMiniTooltip(){
  let tipEl=null;
  function ensureTip(){
    if(!tipEl){ tipEl=document.createElement('div'); tipEl.className='mini-tooltip'; document.body.appendChild(tipEl); }
    return tipEl;
  }
  function placeOnElement(el){
    const t=ensureTip();
    const r=el.getBoundingClientRect();
    t.style.left=(r.left+r.width/2)+'px';
    t.style.top=r.top+'px';
  }
  document.addEventListener('mouseover', e=>{
    const el=e.target.closest('#previewBody .mask, #previewBody td.picked');
    if(!el || !el.dataset.tip) return;
    const t=ensureTip();
    t.textContent=el.dataset.tip;
    t.style.display='block';
    placeOnElement(el);
  });
  document.addEventListener('mouseout', e=>{
    const el=e.target.closest('#previewBody .mask, #previewBody td.picked');
    if(el && tipEl) tipEl.style.display='none';
  });
})();
/* ---- AIで自動マスク：文書/シートをまるごとAIに渡し、可変部分を自動検出してマスクする ---- */
async function aiAutoMask(){
  const d=state.draft;
  try{
    if(d.fileType==='docx'){
      loading(true, 'AIが本文から可変部分を検出中…');
      const body=document.getElementById('previewBody');
      const full=previewFullText(body);
      const { variables, error } = await callAI('suggestVariables', { fileType:'docx', fullText: full });
      if(error) throw new Error(error);
      loading(false);
      addAutoDetectedDocxVars(variables||[], full);
    }else{
      const cells=[];
      d.workbook.SheetNames.forEach(sn=>{
        const ws=d.workbook.Sheets[sn]; if(!ws['!ref']) return;
        const range=XLSX.utils.decode_range(ws['!ref']);
        const maxR=Math.min(range.e.r, range.s.r+199);
        for(let r=range.s.r;r<=maxR;r++){
          for(let c=range.s.c;c<=range.e.c;c++){
            const addr=XLSX.utils.encode_cell({r,c});
            const cell=ws[addr];
            const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
            if(val!=='' && val!=null) cells.push({ sheet:sn, addr, value:String(val) });
          }
        }
      });
      if(!cells.length){ toast('検出対象のセルが見つかりませんでした', true); return; }
      loading(true, 'AIがシートから可変セルを検出中…');
      const { variables, error } = await callAI('suggestVariables', { fileType:'xlsx', cells });
      if(error) throw new Error(error);
      loading(false);
      addAutoDetectedXlsxVars(variables||[]);
    }
  }catch(e){ loading(false); toast('自動マスクに失敗しました: '+e.message, true); }
}
// docx：AIが返した{text, propName}を、本文中の出現位置に順番に割り当ててマスク化する
function addAutoDetectedDocxVars(list, full){
  if(!list.length){ toast('可変部分が見つかりませんでした', true); return; }
  const d=state.draft;
  const nextOcc={}; // 同一文言が複数回出てくる場合に、出現順で重複なく割り当てるためのカウンタ
  let added=0, skipped=0;
  list.forEach(item=>{
    const text=String(item && item.text || '').trim();
    if(!text) return;
    const occurrence = nextOcc[text]||0;
    nextOcc[text]=occurrence+1;
    const positions=allIndexOf(full, text);
    if(positions[occurrence]==null){ skipped++; return; } // 本文中に見つからない箇所は除外
    if(d.variables.some(v=>v.originalText===text && v.occurrence===occurrence)) return; // 既にマスク済みならスキップ
    d.variables.push({ key:uid(), originalText:text, occurrence, propName: uniquePropName_(d, item.propName) });
    added++;
  });
  renderDocxPreview(document.getElementById('previewBody'));
  applyMaskModeUI();
  refreshVarList();
  toast(added
    ? `AIが${added}件の可変部分を自動マスクしました${skipped?`（${skipped}件は本文と一致せず除外）`:''}`
    : '新たに検出できる箇所はありませんでした');
}
// xlsx：AIが返した{sheet, addr, propName}のセルをマスク化する
function addAutoDetectedXlsxVars(list){
  if(!list.length){ toast('可変セルが見つかりませんでした', true); return; }
  const d=state.draft;
  let added=0;
  list.forEach(item=>{
    const sheet=item && item.sheet, addr=item && item.addr;
    if(!sheet || !addr) return;
    if(d.variables.some(v=>v.sheet===sheet && v.addr===addr)) return; // 既にマスク済みならスキップ
    const ws=d.workbook.Sheets[sheet]; if(!ws) return;
    const cell=ws[addr]; const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
    if(val==='' || val==null) return;
    d.variables.push({ key:uid(), sheet, addr, originalText:String(val), propName: uniquePropName_(d, item.propName) });
    added++;
  });
  const body=document.getElementById('previewBody');
  if(body){
    body.querySelectorAll('td').forEach(td=>{
      if(d.variables.some(v=>v.sheet===td.dataset.sheet && v.addr===td.dataset.addr)) td.classList.add('picked');
    });
  }
  refreshVarList();
  toast(added ? `AIが${added}件の可変セルを自動マスクしました` : '新たに検出できるセルはありませんでした');
}
// 項目名の重複を避けるため、既存と被る場合は末尾に(2)(3)…を付与する
function uniquePropName_(d, base){
  base=String(base||'').trim() || '項目';
  let name=base, i=2;
  while(d.variables.some(v=>v.propName===name)){ name=base+'('+i+')'; i++; }
  return name;
}
/* ---- ④ AIで項目名生成 ---- */
async function aiGenerateNames(){
  const d=state.draft;
  if(!d.variables.length){ toast('先にマスクしてください', true); return; }
  try{
    loading(true,'AIが項目名を考えています…');
    const { names }=await callAI('generatePropNames',{ texts:d.variables.map(v=>v.originalText) });
    d.variables.forEach((v,i)=>{ if(names[i]) v.propName=names[i]; });
    loading(false); refreshVarList(); toast('項目名を生成しました');
  }catch(e){ loading(false); toast(e.message, true); }
}
/* ---- ⑥ 保存 ---- */
function saveTemplate(){
  const d=state.draft;
  if(!d.name.trim()){ toast('フォーマット名を入力してください', true); return; }
  if(!d.variables.length){ toast('最低1つはマスクしてください', true); return; }
  const empty=d.variables.filter(v=>!v.propName.trim());
  if(empty.length){ toast('すべての項目名を入力してください', true); return; }
  // propName重複チェック
  const names=d.variables.map(v=>v.propName.trim());
  if(new Set(names).size!==names.length){ toast('項目名が重複しています', true); return; }
  const record={
    id: d.editId || uid(),
    name:d.name.trim(), fileType:d.fileType, fileBase64:d.fileBase64,
    variables:d.variables.map(v=>({ propName:v.propName.trim(), originalText:v.originalText, occurrence:(v.occurrence??null), sheet:v.sheet||null, addr:v.addr||null }))
  };
  if(d.editId){
    const idx=state.templates.findIndex(t=>t.id===d.editId);
    if(idx>=0) state.templates[idx]=record; else state.templates.push(record);
    saveTemplates();
    toast('フォーマットを上書き保存しました');
  }else{
    state.templates.push(record);
    saveTemplates();
    toast('フォーマットを保存しました');
  }
  go('templates');
}

async function analyzeSource(){
  const m=state.make, t=m.template;
  if(!m.source.trim() && !m.image){ toast('テキストを貼り付けるか、画像を添付してください', true); return; }
  try{
    loading(true, 'AIが情報を解析して入力中…');
    const payload = {
      variables: t.variables.map(v=>({ propName:v.propName, originalText:v.originalText })),
      source: m.source
    };
    if(m.image){
      payload.imageBase64 = m.image.base64;
      payload.imageMime = m.image.mime;
    }
    const { values } = await callAI('extractValues', payload);
    t.variables.forEach(v=>{
      if(values && values[v.propName] !== undefined){
        m.values[v.propName] = values[v.propName];
      }
    });
    loading(false);
    renderMakeFormFields();
    toast('AI自動入力を反映しました。内容をご確認ください。');
  }catch(e){ loading(false); toast(e.message, true); }
}

async function generateOutput(filename){
  const m=state.make, t=m.template;

    loading(true,'契約書ファイルを生成中…');

    else await generateXlsx(t, m.values, filename);
    loading(false);
    toast('契約書を出力しました');
  }catch(e){ loading(false); toast('生成エラー: '+e.message, true); }
}
/* ---- docx 生成（XMLを直接置換して書式を保持 / 出現位置ごとに個別置換） ---- */
async function generateDocx(t, values, filename){
  const zip=new PizZip(base64ToAb(t.fileBase64));
  const xmlFile=zip.file('word/document.xml');
  if(!xmlFile) throw new Error('document.xmlが見つかりません');
  const doc=new DOMParser().parseFromString(xmlFile.asText(),'application/xml');
  // 文書全体の w:t を文書順に集約（マスク時のプレビュー連結と同じ数え方に合わせる）
  const runs=[...doc.getElementsByTagName('w:t')].map(node=>({node}));
  const full=runs.map(r=>r.node.textContent).join('');
  const missing=[], jobs=[];
  t.variables.forEach(v=>{
    const positions=allIndexOf(full, v.originalText);
    const occ=(v.occurrence!=null?v.occurrence:0);   // 何番目の出現か
    const start=positions[occ];
    if(start==null){ missing.push(v.propName); return; }
    jobs.push({ start, end:start+v.originalText.length, value:(values[v.propName]||'') });
  });
  // 右（後方）から順に置換 → 前方の位置がずれず、同一文言でも各出現を正しく差し替えられる
  jobs.sort((a,b)=>b.start-a.start);
  jobs.forEach(j=>replaceRangeInRuns(runs, j.start, j.end, j.value));
  const out=new XMLSerializer().serializeToString(doc);
  zip.file('word/document.xml', out);
  const blob=zip.generate({ type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  download(blob, `${filename}.docx`);
  if(missing.length) toast('一部の項目が本文中に見つかりませんでした: '+missing.join(', '), true);
}
function setT(node, text){ node.textContent=text; node.setAttribute('xml:space','preserve'); }
// 文書全体の連結テキストにおける絶対区間[start,end)を、複数runにまたがって置換
function replaceRangeInRuns(runs, start, end, value){
  const texts=runs.map(r=>r.node.textContent);
  let pos=0, sR=-1, sO=0, eR=-1, eO=0;
  for(let i=0;i<texts.length;i++){
    const len=texts[i].length;
    if(sR<0 && start<pos+len){ sR=i; sO=start-pos; }
    if(end<=pos+len){ eR=i; eO=end-pos; break; }
    pos+=len;
  }
  if(sR<0||eR<0) return false;
  if(sR===eR){ setT(runs[sR].node, texts[sR].slice(0,sO)+value+texts[sR].slice(eO)); }
  else{
    setT(runs[sR].node, texts[sR].slice(0,sO)+value);
    for(let i=sR+1;i<eR;i++) setT(runs[i].node,'');
    setT(runs[eR].node, texts[eR].slice(eO));
  }
  return true;
}
/* ---- xlsx 生成（セル値を書き換えて書式を保持） ---- */
async function generateXlsx(t, values, filename){
  const wb=XLSX.read(base64ToAb(t.fileBase64),{type:'array',cellStyles:true});
  t.variables.forEach(v=>{
    const ws=wb.Sheets[v.sheet]; if(!ws) return;
    const val=values[v.propName]||'';
    const cell=ws[v.addr]||{};
    const num=Number(val);
    if(val!=='' && !isNaN(num) && /^-?\d+(\.\d+)?$/.test(val.trim())){ cell.t='n'; cell.v=num; }
    else { cell.t='s'; cell.v=val; }
    delete cell.w; delete cell.f;
    ws[v.addr]=cell;
  });
  const arr=XLSX.write(wb,{type:'array',bookType:'xlsx',cellStyles:true});
  download(new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), `${filename}.xlsx`);
}
