// 自前ツールチップ（遅延なしで即表示。マスク／マスク済みセルにのみ反応。対象要素の上に固定表示）
(function initMiniTooltip(){
  let tipEl=null;
  function ensureTip(){
    if(!tipEl){ tipEl=document.createElement('div'); tipEl.className='mini-tooltip'; document.body.appendChild(tipEl); }
    return tipEl;
  }
  function placeOnElement(el){
    const t=ensureTip();
    const r=el.getBoundingClientRect();
    t.style.left=(r.left+r.width/2)+'px';
    t.style.top=r.top+'px';
  }
  document.addEventListener('mouseover', e=>{
    const el=e.target.closest('#previewBody .mask, #previewBody td.picked');
    if(!el || !el.dataset.tip) return;
    const t=ensureTip();
    t.textContent=el.dataset.tip;
    t.style.display='block';
    placeOnElement(el);
  });
  document.addEventListener('mouseout', e=>{
    const el=e.target.closest('#previewBody .mask, #previewBody td.picked');
    if(el && tipEl) tipEl.style.display='none';
  });
})();
/* ---- AIで自動マスク：文書/シートをまるごとAIに渡し、可変部分を自動検出してマスクする ---- */
async function aiAutoMask(){
  if(!_gasPassword){ AuthGate.show(); return; }
  const d=state.draft;
  try{
    if(d.fileType==='docx'){
      loading(true, 'AIが本文から可変部分を検出中…');
      const body=document.getElementById('previewBody');
      const full=previewFullText(body);
      const { variables, error } = await callAI('suggestVariables', { fileType:'docx', fullText: full });
      if (error) throw new Error(error);
      loading(false);
      addAutoDetectedDocxVars(variables||[], full);
    }else{
      const cells=[];
      d.workbook.SheetNames.forEach(sn=>{
        const ws=d.workbook.Sheets[sn]; if(!ws['!ref']) return;
        const range=XLSX.utils.decode_range(ws['!ref']);
        const maxR=Math.min(range.e.r, range.s.r+199);
        for(let r=range.s.r;r<=maxR;r++){
          for(let c=range.s.c;c<=range.e.c;c++){
            const addr=XLSX.utils.encode_cell({r,c});
            const cell=ws[addr];
            const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
            if(val!=='' && val!=null) cells.push({ sheet:sn, addr, value:String(val) });
          }
        }
      });
      if(!cells.length){ toast('検出対象のセルが見つかりませんでした', true); return; }
      loading(true, 'AIがシートから可変セルを検出中…');
      const { variables, error } = await callAI('suggestVariables', { fileType:'xlsx', cells });
      if (error) throw new Error(error);
      loading(false);
      addAutoDetectedXlsxVars(variables||[]);
    }
  }catch(e){ loading(false); toast('自動マスクに失敗しました: '+e.message, true); }
}
// docx：AIが返した{text, propName}を、本文中の出現位置に順番に割り当ててマスク化する
function addAutoDetectedDocxVars(list, full){
  if(!list.length){ toast('可変部分が見つかりませんでした', true); return; }
  const d=state.draft;
  const nextOcc={}; // 同一文言が複数回出てくる場合に、出現順で重複なく割り当てるためのカウンタ
  let added=0, skipped=0, overlapped=0;
  // 既存のマスク（v.originalText/v.occurrence）が、今の本文上でどの[start,end)を占めているかを求める
  function rangeOfExisting(v){
    const positions=allIndexOf(full, v.originalText);
    const start=positions[v.occurrence];
    if(start==null) return null;
    return [start, start+v.originalText.length];
  }
  // 新規追加分どうし・新規と既存が、文字範囲として重なっていないか確認する
  function overlapsExisting(start, end){
    return d.variables.some(v=>{
      const r=rangeOfExisting(v);
      if(!r) return false;
      return start<r[1] && r[0]<end; // 区間が重なっているか
    });
  }
  list.forEach(item=>{
    const text=String(item && item.text || '').trim();
    if(!text) return;
    const occurrence = nextOcc[text]||0;
    nextOcc[text]=occurrence+1;
    const positions=allIndexOf(full, text);
    const start=positions[occurrence];
    if(start==null){ skipped++; return; } // 本文中に見つからない箇所は除外
    const end=start+text.length;
    if(d.variables.some(v=>v.originalText===text && v.occurrence===occurrence)) return; // 既にマスク済みならスキップ
    if(overlapsExisting(start, end)){ overlapped++; return; } // 既存（または今回追加済み）のマスクと範囲が重なる場合は除外
    d.variables.push({ key:uid(), originalText:text, occurrence, propName: uniquePropName_(d, item.propName) });
    added++;
  });
  renderDocxPreview(document.getElementById('previewBody'));
  applyMaskModeUI();
  refreshVarList();
  toast(added
    ? `AIが${added}件の可変部分を自動マスクしました${skipped?`（${skipped}件は本文と一致せず除外）`:''}${overlapped?`（${overlapped}件は他のマスクと重複するため除外）`:''}`
    : '新たに検出できる箇所はありませんでした');
}
// xlsx：AIが返した{sheet, addr, propName}のセルをマスク化する
function addAutoDetectedXlsxVars(list){
  if(!list.length){ toast('可変セルが見つかりませんでした', true); return; }
  const d=state.draft;
  let added=0;
  list.forEach(item=>{
    const sheet=item && item.sheet, addr=item && item.addr;
    if(!sheet || !addr) return;
    if(d.variables.some(v=>v.sheet===sheet && v.addr===addr)) return; // 既にマスク済みならスキップ
    const ws=d.workbook.Sheets[sheet]; if(!ws) return;
    const cell=ws[addr]; const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
    if(val==='' || val==null) return;
    d.variables.push({ key:uid(), sheet, addr, originalText:String(val), propName: uniquePropName_(d, item.propName) });
    added++;
  });
  const body=document.getElementById('previewBody');
  if(body){
    body.querySelectorAll('td').forEach(td=>{
      if(d.variables.some(v=>v.sheet===td.dataset.sheet && v.addr===td.dataset.addr)) td.classList.add('picked');
    });
  }
  refreshVarList();
  toast(added ? `AIが${added}件の可変セルを自動マスクしました` : '新たに検出できるセルはありませんでした');
}
// 項目名を正規化するだけの関数（同じ項目名は「同じ変数」として扱うため、重複していても連番は付けない）
function uniquePropName_(d, base){
  return String(base||'').trim() || '項目';
}
/* ---- ④ AIで項目名生成 ---- */
async function aiGenerateNames(){
  if(!_gasPassword){ AuthGate.show(); return; }
  const d=state.draft;
  if(!d.variables.length){ toast('先にマスクしてください', true); return; }
  try{
    loading(true,'AIが項目名を考えています…');
    const items=buildNameContextItems(d);
    const { names }=await callAI('generatePropNames',{ items, texts:d.variables.map(v=>v.originalText) });
    d.variables.forEach((v,i)=>{ if(names[i]) v.propName=names[i]; });
    loading(false); refreshVarList(); toast('項目名を生成しました');
  }catch(e){ loading(false); toast(e.message, true); }
}
/* マスク単体の文字列だけでは何の項目か判断できないため、周囲の文脈を添えてAIに渡す。
   docx：本文中の前後の文章／xlsx：同じ行の左隣のセル（見出しであることが多い）を手がかりにする。 */
function buildNameContextItems(d){
  if(d.fileType==='docx'){
    const body=document.getElementById('previewBody');
    const full=body?previewFullText(body):'';
    return d.variables.map(v=>{
      const positions=allIndexOf(full, v.originalText);
      const start=positions[v.occurrence||0];
      if(start==null) return { text:v.originalText, context:v.originalText };
      const end=start+v.originalText.length;
      const before=full.slice(Math.max(0,start-40), start);
      const after=full.slice(end, end+40);
      return { text:v.originalText, context: before+'《'+v.originalText+'》'+after };
    });
  }
  return d.variables.map(v=>{
    if(!v.addr) return { text:v.originalText, context:v.originalText };
    let leftLabel='';
    try{
      const ws=d.workbook && d.workbook.Sheets[v.sheet];
      const cell=XLSX.utils.decode_cell(v.addr);
      if(ws && cell.c>0){
        const leftAddr=XLSX.utils.encode_cell({r:cell.r,c:cell.c-1});
        const leftCell=ws[leftAddr];
        if(leftCell) leftLabel=String(leftCell.w!=null?leftCell.w:(leftCell.v!=null?leftCell.v:''));
      }
    }catch(e){}
    const context = leftLabel
      ? `シート「${v.sheet}」 隣接セルの見出し:「${leftLabel}」 値:「${v.originalText}」`
      : `シート「${v.sheet}」 セル${v.addr} 値:「${v.originalText}」`;
    return { text:v.originalText, context };
  });
}
/* ---- ⑥ 保存 ---- */
function saveTemplate(){
  const d=state.draft;
  if(!d.name.trim()){ toast('フォーマット名を入力してください', true); return; }
  if(!d.variables.length){ toast('最低1つはマスクしてください', true); return; }
  const empty=d.variables.filter(v=>!v.propName.trim());
  if(empty.length){ toast('すべての項目名を入力してください', true); return; }
  // 項目名は繰り返しグループのメンバーも含めて自由に重複してOK。
  // 同じ項目名の箇所は「同じ変数」として扱われ、契約書作成時は1回の入力にまとまる
  // （グループ外の項目がグループのメンバー名と重複する場合は、そのグループの1件目の値が使われる）
  // 文書内の位置（sortOrder）を保存しておき、契約書作成画面でも同じ並び順で表示できるようにする
  const record={
    id: d.editId || uid(),
    name:d.name.trim(), fileType:d.fileType, fileBase64:d.fileBase64,
    variables:d.variables.map(v=>({ propName:v.propName.trim(), originalText:v.originalText, occurrence:(v.occurrence??null), sheet:v.sheet||null, addr:v.addr||null,
      repeatGroupId:v.repeatGroupId||null, repeatRole:v.repeatRole||null, sortOrder:computeVarSortKey(v) })),
    repeatGroups:(d.repeatGroups||[]).map(g=>{
      const anchor=(g.anchorKey && d.variables.find(x=>x.key===g.anchorKey)) || d.variables.find(x=>x.repeatGroupId===g.id);
      return { ...g, sortOrder: anchor?computeVarSortKey(anchor):Number.MAX_SAFE_INTEGER };
    })
  };
  if(d.editId){
    const idx=state.templates.findIndex(t=>t.id===d.editId);
    if(idx>=0) state.templates[idx]=record; else state.templates.push(record);
    saveTemplates();
    toast('フォーマットを上書き保存しました');
  }else{
    state.templates.push(record);
    saveTemplates();
    toast('フォーマットを保存しました');
  }
  go('templates');
}

async function analyzeSource(){
  if(!_gasPassword){ AuthGate.show(); return; }
  const m=state.make, t=m.template;
  if(!m.source.trim() && !m.image){ toast('テキストを貼り付けるか、画像を添付してください', true); return; }
  try{
    loading(true, 'AIが情報を解析して入力中…');
    ensureGroupValues(m);
    // 通常項目に加えて、繰り返し行グループの定義（何行分あるかをAIに判断させるため）も渡す
    const payload = {
      variables: uniqueNonGroupVars(t).map(v=>({ propName:v.propName, originalText:v.originalText })),
      groups: (t.repeatGroups||[]).map(g=>({ id:g.id, label:g.label, memberPropNames:g.memberPropNames })),
      source: m.source
    };
    if(m.image){
      payload.imageBase64 = m.image.base64;
      payload.imageMime = m.image.mime;
    }
    const { values, groupEntries } = await callAI('extractValues', payload);
    if(values){
      uniqueNonGroupVars(t).forEach(v=>{
        if(values[v.propName] !== undefined && values[v.propName] !== '') m.values[v.propName]=values[v.propName];
      });
    }
    // 繰り返し行：AIが「何件あるか」を判断して返した件数ぶんに、行そのものを置き換える
    // （例：担当者が2名見つかれば、1つの行に2人分詰め込むのではなく、行を2つに増やす。
    //   解析をやり直した場合は、既存の内容も含めて新しい結果で上書きする）
    if(groupEntries){
      (t.repeatGroups||[]).forEach(g=>{
        const aiEntries=groupEntries[g.id];
        if(!Array.isArray(aiEntries) || !aiEntries.length) return;
        m.values.__groups[g.id]=aiEntries.map(entryObj=>{
          const e={};
          g.memberPropNames.forEach(p=>{ e[p]=(entryObj && entryObj[p]) || ''; });
          return e;
        });
      });
    }
    // AIは各繰り返し行グループを個別に解析して答えるため、「同じ値として結合」されている
    // 項目（同じ項目名を持つ別のグループ／通常項目）があっても、そのままでは食い違って
    // 一部にしか反映されないことがある。手動入力時の propagateSharedValue と同様に、
    // ここでグループ間・グループ⇔通常項目の値をつき合わせて揃える。
    syncSharedValuesAfterAIFill(t, m);
    loading(false);
    renderMakeFormFields();
    toast('AI自動入力を反映しました。内容をご確認ください。');
  }catch(e){ loading(false); toast(e.message, true); }
}
function ensureGroupValues(m){
  const t=m.template;
  m.values.__groups = m.values.__groups || {};
  (t.repeatGroups||[]).forEach(g=>{
    if(m.values.__groups[g.id]) return;
    m.values.__groups[g.id] = [ Object.fromEntries(g.memberPropNames.map(p=>[p,''])) ];
  });
}
// 値入力用のtextareaを、内容の行数に応じて自動で高さを伸ばす（改行入力に対応するため）

// 項目名から「会社名／法人名」を表す項目かどうかを推測する（法人情報検索ボタンの表示判定に使う）
function looksLikeCompanyNameField(propName){
  return /(会社名|法人名|商号|社名)/.test(propName);
}
function looksLikeAddressField(propName){
  return /(住所|所在地)/.test(propName);
}
function looksLikeRepresentativeField(propName){
  return /(代表者|代表取締役)/.test(propName);
}
// 「甲の会社名」→「甲の」のように、会社名項目のキーワードより前の部分を接頭辞として取り出す
// （同じ接頭辞を持つ住所・代表者項目を優先的に紐づけるため）
function companyFieldPrefix(propName){
  const m=propName.match(/(会社名|法人名|商号|社名)/);
  return m ? propName.slice(0, m.index) : '';
}
function findRelatedField(t, companyPropName, matcher){
  const prefix=companyFieldPrefix(companyPropName);
  const candidates=uniqueNonGroupVars(t).filter(v=>matcher(v.propName));
  const samePrefix=candidates.find(v=>{
    const m=v.propName.match(/(住所|所在地|代表者|代表取締役)/);
    const p=m?v.propName.slice(0,m.index):'';
    return p===prefix;
  });
  return samePrefix || candidates[0] || null;
}

function applyCompanyCandidate(companyPropName, candidate){
  const m=state.make, t=m.template;
  if(candidate.name) m.values[companyPropName]=candidate.name;
  const addrField=findRelatedField(t, companyPropName, looksLikeAddressField);
  if(addrField && candidate.address) m.values[addrField.propName]=candidate.address;
  const repField=findRelatedField(t, companyPropName, looksLikeRepresentativeField);
  if(repField && candidate.representative) m.values[repField.propName]=candidate.representative;
  document.getElementById('backdrop').classList.remove('show');
  renderMakeFormFields();
  toast('法人情報を反映しました');

// 繰り返しグループに属さない項目を、同じ項目名は1つにまとめて返す（同名＝同じ変数として扱うため）
function uniqueNonGroupVars(t){
  const memberNames=groupMemberPropNameSet(t);
  const seen=new Set(); const out=[];
  t.variables.forEach(v=>{
    if(v.repeatGroupId) return;
    if(memberNames.has(v.propName)) return; // 繰り返しグループのメンバー名と同じ→そちらの1件目の値を使うため、単独の入力欄は出さない
    if(seen.has(v.propName)) return;
    seen.add(v.propName); out.push(v);
  });
  return out;
}
// 繰り返しグループのメンバー項目名を、すべてのグループ分まとめたSetを返す
function groupMemberPropNameSet(t){
  const s=new Set();
  (t.repeatGroups||[]).forEach(g=>g.memberPropNames.forEach(p=>s.add(p)));
  return s;
}
function buildRowGroupCard(m, g){
  const card=document.createElement('div'); card.className='card'; card.style.cssText='margin-bottom:20px;padding:18px 22px';
  const entries=m.values.__groups[g.id];
  card.innerHTML=`<h3 style="font-size:15px;margin:0 0 4px">${esc(g.label)}（${entries.length}件）</h3>
    <div class="hint" style="margin:0 0 6px">件数に応じて行を追加・削除できます。▲▼で順番を入れ替えられます。</div>
    <div id="rg_${g.id}"></div>
    <div class="row" style="margin-top:6px"><button class="btn ghost sm" id="rgAdd_${g.id}">＋ 追加</button></div>`;
  const list=card.querySelector(`#rg_${g.id}`);
  entries.forEach((entry,idx)=>{
    const row=document.createElement('div'); row.style.cssText='margin-bottom:8px;padding:8px;border:1px solid var(--line);border-radius:10px;position:relative';
    const headerRow=document.createElement('div');
    headerRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:6px';
    headerRow.innerHTML=`
      <span class="pill" style="background:var(--brand-soft);color:var(--brand-ink)">${idx+1}件目</span>
      <div class="row" style="gap:4px;margin:0">
        <button class="icon-btn" data-up="1" title="上へ" ${idx===0?'disabled style="opacity:.3;cursor:default"':''}>${icon('arrowUp',14)}</button>
        <button class="icon-btn" data-down="1" title="下へ" ${idx===entries.length-1?'disabled style="opacity:.3;cursor:default"':''}>${icon('arrowDown',14)}</button>
      </div>`;
    row.appendChild(headerRow);
    const fieldsGrid=document.createElement('div'); fieldsGrid.className='form-grid rg-entry-grid';
    fieldsGrid.innerHTML = g.memberPropNames.map(p=>`
      <div class="field" style="margin:0"><label class="lbl">${esc(p)}</label>
        <textarea class="val-input" rows="1" data-p="${esc(p)}">${esc(entry[p]||'')}</textarea></div>`).join('')
      + (entries.length>1?`<div class="row end" style="grid-column:1/-1;margin:0"><button class="btn danger sm" data-rm="1">この行を削除</button></div>`:'');
    row.appendChild(fieldsGrid);
    fieldsGrid.querySelectorAll('textarea').forEach(inp=>{
      autoGrowTextarea(inp);
      inp.oninput=e=>{ entry[e.target.dataset.p]=e.target.value; propagateSharedValue(e.target.dataset.p, e.target.value, g.id, idx); autoGrowTextarea(e.target); };
      inp.onfocus=e=>{ setActiveGroupEntry(g.id, idx); highlightMakePreviewForProp(e.target.dataset.p); };
    });
    const rm=fieldsGrid.querySelector('[data-rm]');
    if(rm) rm.onclick=()=>{
      entries.splice(idx,1);
      // 同じ値として結合されている別の繰り返し行グループも、同じ行番号のエントリを削除して行数を揃える
      linkedGroupIds(m.template, g).forEach(gid=>{
        const e2=m.values.__groups[gid];
        if(e2 && e2.length>idx && e2.length>1) e2.splice(idx,1);
      });
      renderMakeFormFields();
    };
    headerRow.querySelector('[data-up]').onclick=()=>{
      if(idx===0) return;
      [entries[idx-1], entries[idx]]=[entries[idx], entries[idx-1]];
      linkedGroupIds(m.template, g).forEach(gid=>{
        const e2=m.values.__groups[gid];
        if(e2 && e2.length>idx) [e2[idx-1], e2[idx]]=[e2[idx], e2[idx-1]];
      });
      renderMakeFormFields();
    };
    headerRow.querySelector('[data-down]').onclick=()=>{
      if(idx===entries.length-1) return;
      [entries[idx+1], entries[idx]]=[entries[idx], entries[idx+1]];
      linkedGroupIds(m.template, g).forEach(gid=>{
        const e2=m.values.__groups[gid];
        if(e2 && e2.length>idx+1) [e2[idx+1], e2[idx]]=[e2[idx], e2[idx+1]];
      });
      renderMakeFormFields();
    };
    list.appendChild(row);
  });
  card.querySelector(`#rgAdd_${g.id}`).onclick=()=>{
    entries.push(Object.fromEntries(g.memberPropNames.map(p=>[p,''])));
    // 同じ値として結合されている別の繰り返し行グループも、行数が揃うように空の行を追加する
    linkedGroupIds(m.template, g).forEach(gid=>{
      const g2=m.template.repeatGroups.find(x=>x.id===gid);
      const e2=m.values.__groups[gid];
      if(g2 && e2){ while(e2.length<entries.length) e2.push(Object.fromEntries(g2.memberPropNames.map(p=>[p,'']))); }
    });
    renderMakeFormFields();
  };
  return card;
}
/* ============================================================
   数字の全角/半角を統一（入力済みの値をまとめて変換）
============================================================ */
function toFullWidthDigits(s){ return String(s).replace(/[0-9]/g, c=>String.fromCharCode(c.charCodeAt(0)+0xFEE0)); }
function toHalfWidthDigits(s){ return String(s).replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }
function openNumberWidthModal(){
  const bd=document.getElementById('backdrop');
  bd.innerHTML=`
    <div class="modal" style="max-width:420px">
      <div class="modal-head"><h2>数字の全角/半角を統一</h2><p class="hint" style="margin:4px 0 0">入力済みのすべての項目の数字を、選んだ方に揃えます。</p></div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:10px">
        <button class="btn ghost" id="numWidthFull" style="justify-content:flex-start">全角にする（例：１２３）</button>
        <button class="btn ghost" id="numWidthHalf" style="justify-content:flex-start">半角にする（例：123）</button>
      </div>
      <div class="row end" style="padding:0 20px 20px"><button class="btn ghost" id="numWidthCancel">キャンセル</button></div>
    </div>`;
  bd.classList.add('show');
  document.getElementById('numWidthCancel').onclick=()=>bd.classList.remove('show');
  document.getElementById('numWidthFull').onclick=()=>{ applyNumberWidthUnify('full'); bd.classList.remove('show'); };
  document.getElementById('numWidthHalf').onclick=()=>{ applyNumberWidthUnify('half'); bd.classList.remove('show'); };
}
function applyNumberWidthUnify(mode){
  const m=state.make;
  const conv = mode==='full' ? toFullWidthDigits : toHalfWidthDigits;
  Object.keys(m.values).forEach(k=>{
    if(k==='__groups') return;
    if(typeof m.values[k]==='string') m.values[k]=conv(m.values[k]);
  });
  if(m.values.__groups){
    Object.keys(m.values.__groups).forEach(gid=>{
      (m.values.__groups[gid]||[]).forEach(entry=>{
        Object.keys(entry).forEach(p=>{ entry[p]=conv(entry[p]||''); });
      });
    });
  }
  renderMakeFormFields();
  if(m.showPreview) renderMakePreview();
  toast(mode==='full' ? '数字を全角に統一しました' : '数字を半角に統一しました');
}

function toFullWidthAlpha(s){ return String(s).replace(/[A-Za-z]/g, c=>String.fromCharCode(c.charCodeAt(0)+0xFEE0)); }
function toHalfWidthAlpha(s){ return String(s).replace(/[Ａ-Ｚａ-ｚ]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }

      <div class="modal-head"><h2>英字の全角/半角を統一</h2><p class="hint" style="margin:4px 0 0">入力済みのすべての項目の英字を、選んだ方に揃えます。</p></div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:10px">
        <button class="btn ghost" id="alphaWidthFull" style="justify-content:flex-start">全角にする（例：ＡＢＣ）</button>
        <button class="btn ghost" id="alphaWidthHalf" style="justify-content:flex-start">半角にする（例：ABC）</button>
      </div>
      <div class="row end" style="padding:0 20px 20px"><button class="btn ghost" id="alphaWidthCancel">キャンセル</button></div>
    </div>`;
  bd.classList.add('show');
  document.getElementById('alphaWidthCancel').onclick=()=>bd.classList.remove('show');
  document.getElementById('alphaWidthFull').onclick=()=>{ applyAlphaWidthUnify('full'); bd.classList.remove('show'); };
  document.getElementById('alphaWidthHalf').onclick=()=>{ applyAlphaWidthUnify('half'); bd.classList.remove('show'); };
}
function applyAlphaWidthUnify(mode){
  const m=state.make;
  const conv = mode==='full' ? toFullWidthAlpha : toHalfWidthAlpha;
  Object.keys(m.values).forEach(k=>{
    if(k==='__groups') return;
    if(typeof m.values[k]==='string') m.values[k]=conv(m.values[k]);
  });
  if(m.values.__groups){
    Object.keys(m.values.__groups).forEach(gid=>{
      (m.values.__groups[gid]||[]).forEach(entry=>{
        Object.keys(entry).forEach(p=>{ entry[p]=conv(entry[p]||''); });
      });
    });
  }
  renderMakeFormFields();
  if(m.showPreview) renderMakePreview();
  toast(mode==='full' ? '英字を全角に統一しました' : '英字を半角に統一しました');
}
/* ============================================================
   内容確認ダイアログ → 出力
============================================================ */
// 出力前の確認用：入力されていない変数（通常項目・繰り返し行グループのメンバー）の一覧を作る。
// ・通常項目：値が空ならそのまま項目名を挙げる。
// ・繰り返し行グループ：どの項目にも値が無い行（完全な空行）は出力時に自動で詰められて消えるため対象外。
//   一部だけ入力されている行については、空欄の項目だけを「グループ名 n件目: 項目名」の形で挙げる。
function collectEmptyVariableLabels(t, m){
  const labels=[];
  uniqueNonGroupVars(t).forEach(v=>{
    if(!m.values[v.propName]) labels.push(v.propName);
  });
  (t.repeatGroups||[]).forEach(g=>{
    const entries=(m.values.__groups && m.values.__groups[g.id])||[];
    entries.forEach((entry,idx)=>{
      g.memberPropNames.forEach(p=>{
        if(!entry[p]) labels.push(`${g.label} ${idx+1}件目: ${p}`);
      });
    });
  });
  return labels;
}
function openConfirm(){
  const m=state.make, t=m.template;
  const bd=document.getElementById('backdrop');
  // 初期ファイル名をセット（AI生成が使えない/失敗した場合はこのまま）
  const defaultFilename = m.outputFilename || t.name;
  bd.innerHTML=`
    <div class="modal" style="max-width:680px">
      <div class="modal-head"><h2>内容の確認</h2><p class="hint" style="margin:4px 0 0">このまま出力します。修正が必要な場合は「修正に戻る」から入力画面に戻ってください。</p></div>
      <div class="modal-body">
        <div class="field" style="margin-bottom:20px; background:var(--brand-soft); padding:14px; border-radius:10px;">
          <label class="lbl" style="color:var(--brand-ink)">${icon('fileCheck',15)} 出力ファイル名（拡張子は自動付与）<span class="hint" id="filenameAiStatus" style="margin:0 0 0 6px"></span></label>
          <input type="text" id="outputFilenameInput" value="${esc(defaultFilename)}" placeholder="ファイル名を入力">
        </div>
        <div class="preview-pane" style="box-shadow:none">
          <div class="pane-head"><span class="t">書面プレビュー</span></div>
          <div id="confirmPreviewBody" class="docx-preview" style="max-height:50vh;overflow-y:auto"></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="cancelC">修正に戻る</button>
        <button class="btn" id="doneC">${icon('checkCircle',15)} 完了してファイル出力</button>
      </div>
    </div>`;
  bd.classList.add('show');
  
  const fnInput = document.getElementById('outputFilenameInput');
  fnInput.oninput = e => { m.outputFilename = e.target.value; };
  renderMakePreview('confirmPreviewBody');
  document.getElementById('cancelC').onclick=()=>{ bd.classList.remove('show'); renderMakeFormFields(); };
  document.getElementById('doneC').onclick=async()=>{
    const missing=collectEmptyVariableLabels(t, m);
    if(missing.length){
      const proceed=confirm(
        '入力されていない変数があります:\n\n'
        + missing.join('\n')
        + '\n\nこのまま出力してもよろしいですか？'
      );
      if(!proceed) return;
    }
    const finalFilename = sanitizeFilename(m.outputFilename || t.name);
    bd.classList.remove('show'); 
    await generateOutput(finalFilename); 
    renderMakeFormFields(); 
  };
  // AIにログイン済みの場合のみ、入力済み内容からファイル名を自動生成する（未認証時は何もしない＝従来どおり）
  if(gasReady() && _gasPassword) autoGenerateOutputFilename(m, t);
}
async function autoGenerateOutputFilename(m, t){
  const statusEl=document.getElementById('filenameAiStatus');
  const fnInput=document.getElementById('outputFilenameInput');
  if(statusEl) statusEl.innerHTML=`<span class="spinner" style="width:11px;height:11px;border-color:var(--brand-soft);border-top-color:var(--brand)"></span> AIがファイル名を考えています…`;
  try{
    const payload={
      templateName: t.name,
      variables: uniqueNonGroupVars(t).map(v=>({ propName:v.propName, value:m.values[v.propName]||'' })),
      groups: (t.repeatGroups||[]).map(g=>({ label:g.label, entries:(m.values.__groups && m.values.__groups[g.id])||[] })),
      formatInstructions: state.aiFilenameFormat || ''
    };
    const data=await callAI('generateFilename', payload);
    // ダイアログが閉じられていたら反映しない
    if(!fnInput || !document.body.contains(fnInput)) return;
    if(data && data.filename){
      m.outputFilename = data.filename;
      fnInput.value = data.filename;
    }
    if(statusEl) statusEl.textContent='';
  }catch(e){
    if(statusEl) statusEl.textContent='';
    // 自動生成に失敗しても、手入力のファイル名でそのまま続行できるようにする（無言で従来動作にフォールバック）
  }
}
async function generateOutput(filename){
  const m=state.make, t=m.template;
  try{
    loading(true,'契約書ファイルを生成中…');
    if(t.fileType==='docx') await generateDocx(t, m.values, filename);
    else await generateXlsx(t, m.values, filename);
    loading(false);
    // 生成履歴に記録（値のスナップショットを保存し、後から再出力できるようにする）
    state.history.unshift({
      id: uid(), templateId: t.id, templateName: t.name, fileType: t.fileType,
      filename, values: JSON.parse(JSON.stringify(m.values)), createdAt: new Date().toISOString()
    });
    if(state.history.length > 200) state.history.length = 200; // 肥大化防止
    saveHistory();
    toast('契約書を出力しました');
  }catch(e){ loading(false); toast('生成エラー: '+e.message, true); }
}
/* 文書内の絶対区間[start,end)を、現在のrunsに基づいて実際のDOMノード参照に解決する
   （置換を後回しにできるよう、ノードそのものを保持しておく） */
function resolveRangeToRunEdit(runs, start, end){
  const texts=runs.map(r=>r.node.textContent);
  let pos=0, sR=-1, sO=0, eR=-1, eO=0;
  for(let i=0;i<texts.length;i++){
    const len=texts[i].length;
    if(sR<0 && start<pos+len){ sR=i; sO=start-pos; }
    if(end<=pos+len){ eR=i; eO=end-pos; break; }
    pos+=len;
  }
  if(sR<0||eR<0) return null;
  return { startNode:runs[sR].node, startOffset:sO, endNode:runs[eR].node, endOffset:eO,
    middleNodes: runs.slice(sR+1, eR).map(r=>r.node), sameNode: sR===eR };
}
function applyRunEdit(edit, value){
  if(edit.sameNode){
    const t=edit.startNode.textContent;
    writeValueIntoNode(edit.startNode, t.slice(0,edit.startOffset), value, t.slice(edit.endOffset));
  }else{
    const st=edit.startNode.textContent;
    writeValueIntoNode(edit.startNode, st.slice(0,edit.startOffset), value, '');
    edit.middleNodes.forEach(n=>setT(n,''));
    const et=edit.endNode.textContent;
    setT(edit.endNode, et.slice(edit.endOffset));
  }
}
/* ---- docx 生成（XMLを直接置換して書式を保持 / 出現位置ごとに個別置換） ---- */
async function generateDocx(t, values, filename){
  const zip=new PizZip(base64ToAb(t.fileBase64));
  const xmlFile=zip.file('word/document.xml');
  if(!xmlFile) throw new Error('document.xmlが見つかりません');
  const doc=new DOMParser().parseFromString(xmlFile.asText(),'application/xml');

  // 重要：繰り返し行グループを展開すると、同じプレースホルダー文言（例:「●●」）を使う
  // 後続の通常項目の「何番目の出現か」がずれてしまい、違う箇所に値が入る／見つからなくなる
  // 不具合があった。これを防ぐため、展開を始める前に、通常項目の差し込み先を実際のDOMノードへ
  // 解決しておき（ノード参照は展開で他の行が増減しても変わらない）、展開後はそのノード参照へ
  // 直接書き込む。occurrenceの再検索は展開後には行わない。
  // ※ 繰り返し行グループは、値が入っていない行があってもそのまま残す（詰めない）。
  //   詰める対象は、繰り返し行グループに属さない「その変数だけで段落が構成されている」場合のみ。
  const groupFirstEntryByPropName={}; // 名前が衝突する「グループ外の項目」用フォールバック（そのグループの1件目の値）
  (t.repeatGroups||[]).forEach(g=>{
    const gv=values.__groups && values.__groups[g.id];
    if(gv && gv.length){
      g.memberPropNames.forEach(p=>{
        if(!(p in groupFirstEntryByPropName)) groupFirstEntryByPropName[p]=gv[0][p]||'';
      });
    }
  });

  const preRuns=[...doc.getElementsByTagName('w:t')].map(node=>({node}));
  const preFull=preRuns.map(r=>r.node.textContent).join('');
  const missing=[], pendingEdits=[], paragraphsToDelete=new Set();
  t.variables.forEach(v=>{
    if(v.repeatGroupId) return; // 繰り返しグループの実メンバーは展開処理側で反映するため対象外
    const positions=allIndexOf(preFull, v.originalText);
    const occ=(v.occurrence!=null?v.occurrence:0);
    const start=positions[occ];
    if(start==null){ missing.push(v.propName); return; }
    const edit=resolveRangeToRunEdit(preRuns, start, start+v.originalText.length);
    if(!edit){ missing.push(v.propName); return; }
    const value=(values[v.propName]!=null ? values[v.propName] : groupFirstEntryByPropName[v.propName]) || '';
    // 繰り返し行グループに属さない項目で、値が入っておらず、かつその段落が
    // その項目だけで構成されている（他に文字が無い＝行全体がこの変数のみ）場合は、
    // 空文字を書き込むのではなく段落ごと削除して隙間を詰める。
    // ラベル文言と同居している場合（例:「住所：●●●」）は対象外で、従来どおり空文字にする。
    if(!value){
      const para=rgAncestorByTag(edit.startNode, 'w:p');
      if(para){
        const paraFullText=rgFullTextOf(para.getElementsByTagName('w:t'));
        if(paraFullText.trim()===v.originalText.trim()){
          paragraphsToDelete.add(para);
          return;
        }
      }
    }
    pendingEdits.push({ edit, value });
  });

  // 同様に、各繰り返し行グループの対象行（アンカー）も、他のどのグループの展開よりも先に
  // 現時点のDOM上で解決しておく。そうしないと、複数のグループが同じプレースホルダー文言
  // （例:「●●」）を使っている場合、先に展開したグループの分だけ後のグループの出現位置が
  // ずれてしまい、その行が見つからず「反映されない」不具合が起きる。
  const groupAnchors={};
  (t.repeatGroups||[]).forEach(g=>{
    const gv=values.__groups && values.__groups[g.id];
    if(!gv || !gv.length) return;
    const memberVars=g.memberPropNames.map(p=>t.variables.find(v=>v.propName===p && v.repeatGroupId===g.id)).filter(Boolean);
    if(!memberVars.length) return;
    const trNode=rgResolveRowAnchor(doc, memberVars[0].originalText, memberVars[0].occurrence);
    if(!trNode) return;
    groupAnchors[g.id]={ trNode, memberVars };
  });

  // 繰り返し行グループ（行）を展開する。アンカー行は上ですべて解決済みなので、
  // 他のグループが先に展開されて行数が増減しても位置がずれない。
  // 値が入っていない行があっても、繰り返し行グループはそのまま残す（詰めない）。
  (t.repeatGroups||[]).forEach(g=>{
    const gv=values.__groups && values.__groups[g.id];
    if(!gv || !gv.length) return;
    const anchor=groupAnchors[g.id];
    if(!anchor) return;
    const entries=gv.map(entryObj=>g.memberPropNames.map(p=>entryObj[p]||''));
    rgExpandRowGroup(anchor.trNode, anchor.memberVars.map(v=>v.originalText), entries);
  });

  // 展開が終わったあとで、あらかじめ解決しておいたノード参照に直接書き込む
  pendingEdits.forEach(({edit, value})=>applyRunEdit(edit, value));

  // その変数だけで構成されていて値が未入力だった段落を、ここでまとめて削除する
  // （行が詰まった状態になる）。
  paragraphsToDelete.forEach(p=>{ if(p.parentNode) p.parentNode.removeChild(p); });

  const out=new XMLSerializer().serializeToString(doc);
  zip.file('word/document.xml', out);
  const blob=zip.generate({ type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  download(blob, `${filename}.docx`);
  if(missing.length) toast('一部の項目が本文中に見つかりませんでした: '+missing.join(', '), true);
}
function setT(node, text){ node.textContent=text; node.setAttribute('xml:space','preserve'); }
/* 値に改行(\n)が含まれる場合、そのままではWord上で改行として表示されないため、
   <w:t>行1</w:t><w:br/><w:t>行2</w:t>... のように <w:br/> を挟んで実際の改行にする。
   prefix/suffix は、置換対象の前後に残っている元の文字列（改行を含まない前提）。 */
function writeValueIntoNode(node, prefix, value, suffix){
  const doc=node.ownerDocument;
  const lines=String(value).split('\n');
  if(lines.length<=1){ setT(node, prefix+value+suffix); return node; }
  setT(node, prefix+lines[0]);
  let ref=node;
  for(let i=1;i<lines.length;i++){
    const br=doc.createElement('w:br');
    ref.parentNode.insertBefore(br, ref.nextSibling);
    const t2=doc.createElement('w:t'); t2.setAttribute('xml:space','preserve');
    const isLast=(i===lines.length-1);
    t2.textContent=lines[i]+(isLast?suffix:'');
    br.parentNode.insertBefore(t2, br.nextSibling);
    ref=t2;
  }
  return ref;
}
// 文書全体の連結テキストにおける絶対区間[start,end)を、複数runにまたがって置換
function replaceRangeInRuns(runs, start, end, value){
  const texts=runs.map(r=>r.node.textContent);
  let pos=0, sR=-1, sO=0, eR=-1, eO=0;
  for(let i=0;i<texts.length;i++){
    const len=texts[i].length;
    if(sR<0 && start<pos+len){ sR=i; sO=start-pos; }
    if(end<=pos+len){ eR=i; eO=end-pos; break; }
    pos+=len;
  }
  if(sR<0||eR<0) return false;
  if(sR===eR){ writeValueIntoNode(runs[sR].node, texts[sR].slice(0,sO), value, texts[sR].slice(eO)); }
  else{
    writeValueIntoNode(runs[sR].node, texts[sR].slice(0,sO), value, '');
    for(let i=sR+1;i<eR;i++) setT(runs[i].node,'');
    setT(runs[eR].node, texts[eR].slice(eO));
  }
  return true;
}
/* ---- xlsx 生成（セル値を書き換えて書式を保持） ---- */
async function generateXlsx(t, values, filename){
  const wb=XLSX.read(base64ToAb(t.fileBase64),{type:'array',cellStyles:true});
  t.variables.forEach(v=>{
    const ws=wb.Sheets[v.sheet]; if(!ws) return;
    const val=values[v.propName]||'';
    const cell=ws[v.addr]||{};
    const num=Number(val);
    if(val!=='' && !isNaN(num) && /^-?\d+(\.\d+)?$/.test(val.trim())){ cell.t='n'; cell.v=num; }
    else { cell.t='s'; cell.v=val; }
    delete cell.w; delete cell.f;
    ws[v.addr]=cell;
  });
  const arr=XLSX.write(wb,{type:'array',bookType:'xlsx',cellStyles:true});
  download(new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), `${filename}.xlsx`);
}
/* ============================================================
   共通認証ゲート（AuthGate）
   他アプリへ移植する際は AUTH_CONFIG だけを書き換えてください。
============================================================ */
const AUTH_CONFIG = {
  gasUrl: GAS_URL,
  appId: 'contract',
  checkModel: 'gemini-1.5-flash-latest',
  storageKey: 'gas_pw_contract',
  onAuthenticated: (password) => { _gasPassword = password; }
};

const AuthGate = (() => {
  function show(){
    document.getElementById('modalOverlay').classList.remove('hidden');
    setTimeout(()=>document.getElementById('modalPassword').focus(),100);
  }
  function close(){
    document.getElementById('modalOverlay').classList.add('hidden');
  }
  function setStatus(msg, color){
    const el=document.getElementById('modalStatus');
    if(el){ el.innerHTML=msg; el.style.color=color; }
  }
  function setBadge(authenticated){
    const el=document.getElementById('authStatusText');
    if(!el) return;
    if(authenticated){
      el.innerHTML = icon('checkCircle',12) + ' 認証済み';
      el.style.color = '#10B981';
    }else{
      el.innerHTML = icon('lock',12) + ' 未認証';
      el.style.color = 'var(--muted)';
    }
  }
  async function verify(){
    const pwInput=document.getElementById('modalPassword');
    const pw=pwInput.value;
    const btn=document.getElementById('modalBtn');
    if(!pw){ setStatus(icon('alert',12)+' パスワードを入力してください','#EF4444'); return; }
    if(!gasReady()){ setStatus(icon('alert',12)+' AI接続先が未設定です','#EF4444'); return; }
    btn.disabled=true; btn.innerHTML='<span class="spinner" style="width:13px;height:13px"></span> 認証中...';
    setStatus('','');
    try{
      const res = await fetch(GAS_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'checkPassword', payload:{}, password: pw })
      });
      const data = await res.json();
      if(data && data.error) throw new Error(data.error);
      if(data && data.success === false){ setStatus(icon('xCircle',12)+' パスワードが違います','#EF4444'); return; }
      sessionStorage.setItem(AUTH_CONFIG.storageKey, pw);
      pwInput.value='';
      close();
      setBadge(true);
      AUTH_CONFIG.onAuthenticated(pw);
    }catch(err){
      setStatus(icon('xCircle',12)+' '+err.message,'#EF4444');
    }finally{
      btn.disabled=false; btn.innerHTML=icon('unlock',14)+' ログイン';
    }
  }
  function init(){
    const saved=sessionStorage.getItem(AUTH_CONFIG.storageKey);
    if(saved){
      close();
      setBadge(true);
      AUTH_CONFIG.onAuthenticated(saved);
    }else{
      setBadge(false);
    }
  }
  return { show, close, verify, init };
})();

window.addEventListener('DOMContentLoaded', () => AuthGate.init());

})();
