<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>契約書自動作成</title>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.2.0/dist/pizzip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
  :root{
    --bg:#F7F8FA; --surface:#ffffff; --ink:#111827; --muted:#6B7280;
    --line:#E4E7EC; --brand:#3B6EF0; --brand-ink:#2f5de0; --brand-soft:#EEF2FF;
    --accent:#3B6EF0; --accent-soft:#EEF2FF; --mask:#FEF3C7; --mask-line:#D9A441;
    --danger:#EF4444; --radius:10px; --shadow:0 1px 4px rgba(17,24,39,.07),0 8px 24px rgba(17,24,39,.05);
    --text-muted:#9CA3AF; --tag-bg:#F3F4F6; --success:#10B981;
    --gutter:28px; --header-h:65px;
    /* ---- 共通UIコンポーネント雛形と揃えたエイリアス（値は既存と同一） ---- */
    --border:#E4E7EC; --accent-light:#EEF2FF; --text-primary:#111827; --text-secondary:#6B7280;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Noto Sans JP','Inter',"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,"Segoe UI",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased; font-size:14px;
    display:flex; flex-direction:column; overflow:hidden;
  }
  /* ---------------- 共通UIコンポーネント：ヘッダー ---------------- */
  .app-header{
    background:var(--surface); border-bottom:1px solid var(--border); box-sizing:border-box;
    height:68px; padding:0 28px; display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:100; flex:none;
  }
  .app-header .logo{display:flex; align-items:center; gap:12px; height:36px; cursor:pointer}
  .app-header .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .app-header .logo-badge svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .app-header .app-title{font-size:16px;font-weight:600;color:var(--text-primary);margin:0 20px 0 0;white-space:nowrap;line-height:1}
  .app-header .header-center{display:flex;align-items:center;height:36px;gap:4px}
  .app-header .header-right{margin-left:auto;display:flex;align-items:center;height:36px;gap:12px}
  .link-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:8px 14px;border-radius:8px;font-family:inherit;font-weight:600}
  .link-btn:hover{background:var(--brand-soft);color:var(--brand-ink)}
  /* main#app：ダッシュボード（home）は高さ固定で内部スクロール、それ以外は通常ページスクロール */
  main#app{flex:1; min-height:0; overflow-y:auto}
  main#app.fill{overflow:hidden; display:flex; flex-direction:column}
  .dash-top{flex:none; padding:16px calc(var(--gutter) + 16px) 0 calc(var(--gutter) + 16px)}
  .wrap{width:100%; margin:0; padding:var(--gutter) calc(var(--gutter) + 16px) 80px calc(var(--gutter) + 16px)}
  .crumbs{color:var(--muted); font-size:13px; margin-bottom:18px}
  .crumbs b{color:var(--ink)}
  h1{font-size:26px; margin:0; letter-spacing:.01em}
  /* ページ見出し行：ボタンの有無に関わらずタイトルの上端位置をそろえるため flex-start で統一 */
  .page-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px}
  .page-head h1{margin:0}
  h2{font-size:19px; margin:0 0 14px}
  .lead{color:var(--muted); font-size:14px; margin:0 0 26px} /* 文字サイズを14pxに小さく調整 */
  .grid{display:grid; gap:18px}
  .grid.cards{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow)}
  .card.click{cursor:pointer; transition:transform .12s ease, box-shadow .12s ease}
  .card.click:hover{transform:translateY(-2px); box-shadow:0 4px 8px rgba(30,32,40,.08),0 14px 34px rgba(30,32,40,.09)}
  .card .ico{width:44px;height:44px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-size:22px;margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:17px}
  .card p{margin:0;color:var(--muted);font-size:14px}
  .btn{
    display:inline-flex;align-items:center;gap:8px;justify-content:center;
    background:var(--brand);color:#fff;border:none;border-radius:8px;
    padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s
  }
  .btn:hover{background:var(--brand-ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--brand-ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--brand-soft)}
  .btn.accent{background:var(--accent)} .btn.accent:hover{filter:brightness(.94)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid #FECACA}
  .btn.danger:hover{background:#FEF2F2}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .row.end{justify-content:flex-end}
  .field{margin-bottom:18px}
  label.lbl{display:block;font-weight:600;font-size:14px;margin-bottom:4px}
  /* 「フォーマット名」ラベルと「項目設定」見出しなど、フォーム内の小見出しをそろえるための共通クラス */
  .section-heading{display:block;font-weight:600;font-size:14px;margin:0 0 6px;color:var(--ink)}
  .hint{color:var(--muted);font-size:13px;margin-top:4px}
  input[type=text],textarea,select{
    width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-size:15px;font-family:inherit;color:var(--ink)
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  textarea{resize:vertical;min-height:120px}
  textarea.val-input{min-height:38px;max-height:300px;line-height:1.4;overflow-y:hidden}
  input::placeholder,textarea::placeholder{color:var(--text-muted);opacity:1}
  .dropzone{
    border:2px dashed var(--line);border-radius:var(--radius);padding:34px;text-align:center;
    background:#F9FAFB;cursor:pointer;transition:.12s;color:var(--muted)
  }
  .dropzone:hover,.dropzone.drag{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink)}
  .dropzone .big{font-size:34px;margin-bottom:6px}
  .split{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start}
  @media(max-width:820px){.split{grid-template-columns:1fr}}
  /* 契約書作成画面：左サイドバー（フォーマット選択）＋右作業エリア（PMGのlayout/leftと同じ構造・サイズ感） */
  .make-shell{display:flex;flex:1;min-height:0;width:100%;overflow:hidden;padding:0 calc(var(--gutter) + 16px)}
  @media(max-width:820px){.make-shell{flex-direction:column;height:auto;overflow:visible}}
  .make-sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%;overflow:hidden;flex:none;width:260px;min-width:220px}
  @media(max-width:820px){.make-sidebar{width:100%!important;min-width:0;height:auto;border-right:none;border-bottom:1px solid var(--line)}}
  .make-sidebar-head{padding:10px 16px 6px;flex:none;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}
  .make-sidebar-list{flex:1;overflow-y:auto;padding:0 8px 8px}
  .side-tpl-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:.12s}
  .side-tpl-item:hover{background:var(--bg)}
  .side-tpl-item.sel{background:var(--brand-soft);box-shadow:inset 0 0 0 1.5px var(--brand)}
  .side-tpl-item .tpl-ico{width:32px;height:32px;font-size:10px;border-radius:8px;flex:none}
  .side-tpl-item .tpl-meta .nm{font-size:13.5px}
  .side-tpl-item .tpl-meta .sub{font-size:11.5px}
  .make-workarea{flex:1;min-width:0;min-height:320px;height:100%;overflow-y:auto;overflow-x:auto;padding:20px var(--gutter) 40px;scrollbar-gutter:stable}
  @media(max-width:820px){.make-workarea{height:auto;overflow:visible}}
  .make-workarea .empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius)}
  /* ---- ドラッグでサイズ調整できる仕切り（サイドバー幅／プレビュー幅） ---- */
  .h-resizer{flex:none;width:6px;cursor:col-resize;position:relative;background:transparent;transition:background .1s}
  .h-resizer:hover,.h-resizer.dragging{background:var(--brand-soft)}
  .h-resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:28px;border-radius:2px;background:var(--line)}
  .h-resizer:hover::after,.h-resizer.dragging::after{background:var(--brand)}
  @media(max-width:820px){.h-resizer{display:none}}
  .make-split{display:flex;align-items:flex-start;gap:0}
  .make-split #formBox{flex:1 1 auto;min-width:260px}
  .make-split .preview-pane{flex:none;max-width:calc(100% - 280px)}
  @media(max-width:820px){.make-split{flex-direction:column}.make-split .preview-pane{width:100%!important;max-width:100%!important}}
  .preview-pane{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .pane-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:#F9FAFB}
  .pane-head .t{font-weight:600;font-size:14px}
  .docx-preview{padding:22px 26px;max-height:520px;overflow:auto;font-size:14.5px;overflow-wrap:break-word}
  .docx-preview p{margin:0 0 10px}
  .docx-preview table{border-collapse:collapse;margin:8px 0}
  .docx-preview td,.docx-preview th{border:1px solid var(--line);padding:4px 8px;overflow-wrap:normal;word-break:normal}
  .mask{background:var(--mask);border-bottom:2px solid var(--mask-line);border-radius:3px;padding:0 2px;cursor:pointer;white-space:pre-line}
  .mask.mask-selected{outline:2px solid var(--brand);outline-offset:1px}
  .mask:hover{filter:brightness(.96)}
  /* マスクモード切替（鉛筆／消しゴム） */
  .mask-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .mask-toggle button{border:none;background:#fff;padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .mask-toggle button+button{border-left:1px solid var(--line)}
  .mask-toggle button.on{background:var(--brand);color:#fff}
  .mask-toggle button.on.erase{background:var(--accent)}
  /* 鉛筆モード：プレビュー上で選択しやすいカーソル */
  .docx-preview.mode-add{cursor:text}
  .docx-preview.mode-erase .mask{cursor:pointer;outline:1px dashed var(--danger);outline-offset:1px}
  .docx-preview.mode-erase .mask:hover{background:#fbeae8;border-bottom-color:var(--danger)}
  .docx-preview.mode-select .mask{cursor:pointer}
  .docx-preview.mode-select .mask:hover{outline:1px dashed var(--success);outline-offset:1px}
  .mask.mask-checked{outline:2px solid var(--success);outline-offset:1px}
  .docx-preview.mode-edit td,.docx-preview.mode-edit th{cursor:pointer}
  .docx-preview.mode-edit td:hover,.docx-preview.mode-edit th:hover{outline:2px solid var(--brand);outline-offset:-2px;background:var(--brand-soft)}
  .docx-preview.mode-edit p:hover{outline:1px dashed var(--brand);cursor:text}
  .table-edit-toolbar{position:fixed;z-index:2000;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px;display:flex;flex-direction:column;gap:4px;min-width:170px}
  .table-edit-toolbar .btn{width:100%;justify-content:flex-start}
  .table-edit-toolbar-sep{height:1px;background:var(--line);margin:4px 0}
  .xlsx-preview{padding:14px;max-height:520px;overflow:auto}
  .xlsx-preview .sheetname{font-size:12px;font-weight:700;color:var(--muted);margin:10px 4px 4px;text-transform:uppercase;letter-spacing:.04em}
  .xlsx-preview table{border-collapse:collapse;font-size:13px}
  .xlsx-preview td{border:1px solid var(--line);padding:3px 8px;min-width:46px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .xlsx-preview td:empty{min-height:20px}
  .xlsx-preview td.picked{background:var(--mask);outline:2px solid var(--mask-line);outline-offset:-2px}
  .xlsx-preview td.picked.mask-selected{outline:2px solid var(--brand);outline-offset:-2px}
  .xlsx-preview td.picked.mask-checked{outline:2px solid var(--success);outline-offset:-2px}
  .xlsx-preview td:hover{background:var(--brand-soft)}
  .var-list{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;padding-right:4px}
  .var-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;display:flex;gap:10px;align-items:flex-start;transition:box-shadow .15s, border-color .15s}
  .var-item.selected{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .var-item-body{flex:1;min-width:0}
  .var-item .orig{font-size:12px;color:var(--muted);margin-bottom:8px;word-break:break-all}
  .var-item .orig b{background:var(--mask);color:var(--ink);padding:0 3px;border-radius:3px}
  .var-item .prop-row{display:flex;gap:8px;align-items:center}
  .var-item input{flex:1}
  .var-item .grp-check-col{flex:none;width:22px;display:flex;justify-content:center;padding-top:4px}
  .var-item .grp-check-col input[type=checkbox]{width:16px;height:16px;margin:0;cursor:pointer}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:6px;border-radius:8px}
  .icon-btn:hover{background:#F3F4F6;color:var(--danger)}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px}
  .tpl-item{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .tpl-item:hover{border-color:var(--brand);transform:translateY(-1px)}
  .tpl-item.sel{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .tpl-ico{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff}
  .tpl-ico.docx{background:#2b579a}.tpl-ico.xlsx{background:#217346}
  .tpl-meta{flex:1}.tpl-meta .nm{font-weight:600}.tpl-meta .sub{font-size:13px;color:var(--muted)}
  .pill{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--brand-soft);color:var(--brand-ink);font-weight:600}
  .tabs{display:flex;gap:6px;background:#F3F4F6;padding:5px;border-radius:12px;width:max-content;margin-bottom:22px}
  .tabs button{border:none;background:none;padding:9px 18px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted)}
  .tabs button.on{background:#fff;color:var(--brand-ink);box-shadow:var(--shadow)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px 14px}
  .form-grid.rg-entry-grid{grid-template-columns:1fr;gap:6px}
  /* 「各項目を入力」画面（テンプレートの値入力欄）だけ、縦方向を詰めて画面の縦幅を抑える */
  #fieldsAndGroups label.lbl{margin-bottom:2px}
  #fieldsAndGroups textarea.val-input{padding:6px 10px;min-height:34px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.err{background:var(--danger)}
  .backdrop{position:fixed;inset:0;background:rgba(20,22,28,.45);display:none;place-items:center;z-index:150;padding:20px}
  .backdrop.show{display:grid}
  .modal{background:var(--surface);border-radius:16px;max-width:640px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{padding:20px 24px 6px}.modal-head h2{margin:0}
  .modal-body{padding:8px 24px}
  .modal-foot{padding:16px 24px 22px;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:linear-gradient(transparent,var(--surface) 30%)}
  .confirm-row{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .confirm-row .k{font-size:13px;color:var(--muted);font-weight:600}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-overlay{position:fixed;inset:0;background:rgba(245,244,240,.7);backdrop-filter:blur(2px);display:none;place-items:center;z-index:180}
  .loading-overlay.show{display:grid}
  .loading-box{background:#fff;padding:24px 30px;border-radius:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;font-weight:600}
  .loading-box .spinner{border-color:var(--brand-soft);border-top-color:var(--brand)}
  .warnbox{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px}
  .thumb-preview{margin-top:12px;display:flex;justify-content:center}
  .thumb-preview img{max-height:110px;border-radius:6px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  /* マスクの項目名ツールチップ（ネイティブtitleは表示が遅いため自前実装） */
  .mini-tooltip{position:fixed;z-index:9999;background:var(--ink);color:#fff;font-size:12px;font-weight:600;
    padding:5px 9px;border-radius:6px;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);
    transform:translate(-50%,-100%);margin-top:-10px;display:none}
  /* ==== 共通認証ゲート（Auth Gate） ==== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
  .modal-overlay.hidden{display:none}
  .modal{background:var(--surface);border-radius:16px;padding:36px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.18);position:relative;max-height:90vh;overflow-y:auto}
  .modal-icon{margin-bottom:12px;color:var(--accent)}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6}
  .modal input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--bg);outline:none;margin-bottom:10px}
  .modal input:focus{border-color:var(--accent);background:#fff}
  .modal .btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .modal .btn-primary:hover{filter:brightness(.92)}
  .modal .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .modal-status{font-size:12px;text-align:center;min-height:18px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:4px}
  .modal-close-btn{position:absolute;top:20px;right:20px;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;display:flex}
  .modal-close-btn:hover{color:var(--text-primary)}
</style>
</head>
<body>
<header class="app-header">
  <div class="logo" onclick="go('home')">
    <span class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    </span>
    <h1 class="app-title">契約書自動作成</h1>
  </div>
  <div class="header-center" id="headerCenterSlot"></div>
  <div class="header-right" id="headerRightSlot">

/* ============================================================

function sanitizeFilename(name){
  let s = String(name||'').trim();
  // OSで使用できない文字を全角相当や空白に置き換え
  s = s.replace(/[\\/:*?"<>|]/g, '_');
  // 制御文字を除去
  s = s.replace(/[\x00-\x1f]/g, '');
  // 末尾のドット・空白はWindowsで問題になるため除去
  s = s.replace(/[\s.]+$/g, '');
  // 長すぎる場合は切り詰め
  if(s.length > 150) s = s.slice(0, 150);
  return s || '契約書出力';
}

function toast(msg, isErr){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isErr?' err':''); setTimeout(()=>t.className='toast',2600); }
function loading(on, text){ const l=document.getElementById('loading'); document.getElementById('loadingText').textContent=text||'AIが処理しています…'; l.classList.toggle('show',!!on); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fileToBase64(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);}); }
function abToBase64(ab){ let bin='';const b=new Uint8Array(ab),ck=0x8000; for(let i=0;i<b.length;i+=ck) bin+=String.fromCharCode.apply(null,b.subarray(i,i+ck)); return btoa(bin); }
function base64ToAb(b64){ const bin=atob(b64),len=bin.length,bytes=new Uint8Array(len); for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }
function download(blob, filename){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),4000); }
/* ============================================================
   AI呼び出し（すべてGAS Web App経由でGeminiを実行）
============================================================ */
function gasReady(){ return GAS_URL && !/PUT_YOUR_DEPLOY_ID_HERE/.test(GAS_URL); }
let _gasPassword = '';
async function callAI(action, payload){
  if(!gasReady()){ throw new Error('AI接続先が未設定です。管理者にお問い合わせください。'); }
  if(!_gasPassword){ AuthGate.show(); throw new Error('先にパスワードでログインしてください。'); }
  // 「AI設定」の“常に考慮すべき事項”は、AI自動入力（extractValues）にのみ付け加える
  const fullPayload = (action==='extractValues')
    ? { ...payload, defaultInstructions: state.aiDefaultInstructions || '' }
    : payload;
  const res = await fetch(GAS_URL, {
    method:'POST',
    // text/plain にすることでCORSプリフライトを回避（GAS Web Appの定石）
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload: fullPayload, password: _gasPassword })
  });
  const data = await res.json();
  if(data.error) throw new Error('AIエラー: '+data.error);
  return data;
}

/* ---- 汎用：要素の左右にドラッグして幅を変えられる仕切りを取り付ける ---- */
/* invert: true の場合、対象要素が仕切りの右側にあるとみなし、カーソルを左に動かすと幅が広がるようにする
   （対象要素が仕切りの左側にある場合はfalseのまま＝カーソルを右に動かすと幅が広がる）
   getMax: 指定すると、固定のmaxの代わりに「今実際に許容できる最大幅」をその都度計算する関数を使う。
   （書面プレビューを広げすぎて、左側の入力欄がはみ出す不具合を防ぐため） */
function attachHResizer(resizerEl, targetEl, opts){
  if(!resizerEl || !targetEl) return;
  const { min=200, max=800, storageKey, invert=false, getMax=null } = opts||{};
  let startX=0, startWidth=0;
  function currentMax(){ return getMax ? Math.max(min, getMax()) : max; }
  function onMove(e){
    const dx=e.clientX-startX;
    let w=startWidth+(invert?-dx:dx);
    w=Math.max(min, Math.min(currentMax(), w));
    targetEl.style.width=w+'px';
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    resizerEl.classList.remove('dragging');
    document.body.style.userSelect='';
    if(storageKey) setUiSize(storageKey, targetEl.getBoundingClientRect().width);
  }
  resizerEl.addEventListener('mousedown', e=>{
    startX=e.clientX;
    startWidth=targetEl.getBoundingClientRect().width;
    resizerEl.classList.add('dragging');
    document.body.style.userSelect='none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
}
/* ---- 書面プレビュー幅：現在の画面幅に対して広すぎる場合は、入力欄がはみ出さないよう自動で縮める ---- */
function clampPreviewPaneWidth(){
  const pane=document.getElementById('makePreviewPane');
  const split=pane && pane.closest('.make-split');
  const formBox=document.getElementById('formBox');
  if(!pane || !split || !formBox) return;
  const formMinWidth=260; // .make-split #formBox の min-width と合わせる
  const resizerAndGap=20; // 仕切り(h-resizer)ぶんの余裕（CSSのmax-width:calc(100% - 280px)と合わせる）
  const available=split.getBoundingClientRect().width - formMinWidth - resizerAndGap;
  const min=280;
  const max=Math.max(min, Math.min(900, available));
  const current=pane.getBoundingClientRect().width;
  if(current>max+1){
    pane.style.width=max+'px';
    setUiSize('previewWidth', max);
  }
}

function focusMakeFormFieldForProp(propName){
  const standalone=document.querySelector(`#fieldsAndGroups textarea[data-prop="${CSS.escape(propName)}"]`);
  if(standalone){
    standalone.focus();
    standalone.scrollIntoView({block:'center', behavior:'smooth'});
    return;
  }
  // 繰り返し行のメンバーの場合：選択中（無ければ1件目）のエントリの入力欄にフォーカスする
  const m=state.make, t=m.template;
  const g=(t.repeatGroups||[]).find(gr=>gr.memberPropNames.includes(propName));
  if(!g) return;
  const idx=(m.activeGroupEntryIndex && m.activeGroupEntryIndex[g.id]) || 0;
  const rows=document.querySelectorAll(`#fieldsAndGroups textarea[data-p="${CSS.escape(propName)}"]`);
  const target=rows[idx]||rows[0];
  if(target){
    setActiveGroupEntry(g.id, rows.length?[...rows].indexOf(target):0);
    target.focus();
    target.scrollIntoView({block:'center', behavior:'smooth'});

}
// プレビュー本文中のマスク該当箇所を <span class="mask" data-prop="項目名"> で包む（読み取り専用のハイライト表示用）
function markMakePreviewMasks(t, body){
  const walker=document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
  const nodes=[]; let n; while((n=walker.nextNode())) nodes.push(n);
  const starts=[]; let acc=0;
  nodes.forEach(nd=>{ starts.push(acc); acc+=nd.nodeValue.length; });
  const full=nodes.map(nd=>nd.nodeValue).join('');
  const pieceMap=new Map();
  t.variables.forEach(v=>{
    const positions=allIndexOf(full, v.originalText);
    const occ=(v.occurrence!=null?v.occurrence:0);
    const start=positions[occ];
    if(start==null) return;
    const end=start+v.originalText.length;
    for(let i=0;i<nodes.length;i++){
      const ns=starts[i], ne=ns+nodes[i].nodeValue.length;
      const s=Math.max(start,ns), e=Math.min(end,ne);
      if(s<e){
        if(!pieceMap.has(nodes[i])) pieceMap.set(nodes[i],[]);
        pieceMap.get(nodes[i]).push({s:s-ns,e:e-ns,prop:v.propName});
      }
    }
  });
  pieceMap.forEach((pieces,node)=>{
    pieces.sort((a,b)=>a.s-b.s);
    const parent=node.parentNode; if(!parent) return;
    const text=node.nodeValue;
    let cursor=0;
    const frag=document.createDocumentFragment();
    pieces.forEach(p=>{
      if(p.s>cursor) frag.appendChild(document.createTextNode(text.slice(cursor,p.s)));
      const span=document.createElement('span');
      span.className='mask';
      span.dataset.prop=p.prop;
      span.dataset.orig=text.slice(p.s,p.e);
      span.textContent=currentMakePreviewValueFor(p.prop) || span.dataset.orig;
      frag.appendChild(span);
      cursor=p.e;
    });
    if(cursor<text.length) frag.appendChild(document.createTextNode(text.slice(cursor)));
    parent.replaceChild(frag, node);
  });
}
// 入力欄にフォーカスしたとき、プレビュー側の該当マスクをハイライト＆スクロールする

// プレビュー初回描画時、各マスクに「今表示すべき値」を決める（通常項目はその値、繰り返し行は選択中の1件の値）
function currentMakePreviewValueFor(propName){
  const m=state.make; if(!m) return '';
  if(m.values && m.values[propName]) return m.values[propName];
  const g=(m.template.repeatGroups||[]).find(gr=>gr.memberPropNames.includes(propName));
  if(g && m.values.__groups && m.values.__groups[g.id] && m.values.__groups[g.id].length){
    const idx=(m.activeGroupEntryIndex && m.activeGroupEntryIndex[g.id]) || 0;
    const entry=m.values.__groups[g.id][idx] || m.values.__groups[g.id][0];
    return (entry && entry[propName]) || '';
  }
  return '';
}
// 入力するたびに、プレビュー内の該当マスクの表示テキストをその場で書き換える（未入力なら元のプレースホルダーに戻す）
function updateMakePreviewValue(propName, value){

  if(!body) return;
  body.querySelectorAll(`.mask[data-prop="${CSS.escape(propName)}"]`).forEach(el=>{

// 別の繰り返し行グループでも同じ項目名（＝同じ値として結合）を持つグループのIDを返す
function linkedGroupIds(t, g){
  const names=new Set(g.memberPropNames);
  return (t.repeatGroups||[]).filter(g2=>g2.id!==g.id && g2.memberPropNames.some(p=>names.has(p))).map(g2=>g2.id);
}
// 「同じ値」として結合されている項目は、どこか1箇所に入力すると他の全ての入力欄にも自動反映する。
// - 通常項目どうしは元々1つの入力欄にまとまっているのでそのまま。
// - 繰り返し行のメンバー項目名が、他の通常項目や別の繰り返し行のメンバーと同じ場合、
//   同じ行番号（sourceIndex）のエントリの値と、画面に表示されている入力欄（DOM）も書き換える。
//   （表Aの1行目と表Bの1行目、2行目と2行目…が対応するように、行番号で揃える）
function propagateSharedValue(propName, value, sourceGroupId, sourceIndex){
  const m=state.make, t=m.template;
  m.values[propName]=value;
  // 通常項目の入力欄（自分自身以外に表示されていれば）を更新
  document.querySelectorAll(`#fieldsAndGroups textarea[data-prop="${CSS.escape(propName)}"]`).forEach(inp=>{
    if(inp.value!==value) inp.value=value;
  });
  // 他の繰り返し行グループにも同じ項目名のメンバーがあれば、同じ行番号のエントリの値とDOM表示を同期する
  (t.repeatGroups||[]).forEach(g=>{
    if(g.id===sourceGroupId) return;
    if(!g.memberPropNames.includes(propName)) return;
    const entries=m.values.__groups && m.values.__groups[g.id];
    if(!entries || !entries.length) return;
    const idx = (sourceIndex!=null && sourceIndex<entries.length) ? sourceIndex
      : ((m.activeGroupEntryIndex && m.activeGroupEntryIndex[g.id]) || 0);
    entries[idx][propName]=value;
    const groupListEl=document.getElementById('rg_'+g.id);
    const target=groupListEl ? [...groupListEl.querySelectorAll(`textarea[data-p="${CSS.escape(propName)}"]`)][idx] : null;
    if(target && target.value!==value) target.value=value;
  });
  updateMakePreviewValue(propName, value);
}
// AI自動入力の直後に呼ぶ、「同じ値として結合」されている項目どうしのつき合わせ処理。
// propagateSharedValue（手動入力用）はDOM更新も兼ねているが、こちらはAI結果の反映直後
// （renderMakeFormFields で描画し直す前）に呼ぶため、m.values / m.values.__groups の
// データだけを揃えれば十分。
// 1) 複数の繰り返し行グループが同じ項目名をメンバーに持つ場合（表が文書内に複数回出てくる等）、
//    行番号ごとに、どこかのグループのAI結果に値が入っていれば、他の同項目名グループにもコピーする。
// 2) 通常項目（単独項目）が、繰り返し行グループのメンバーと同じ項目名を持つ場合も、
//    どちらかに値があれば揃える（通常項目 → グループ1件目、グループ1件目 → 通常項目の両方向）。
function syncSharedValuesAfterAIFill(t, m){
  const groups=t.repeatGroups||[];
  if(!groups.length) return;
  m.values.__groups=m.values.__groups||{};

  // 項目名 → それをメンバーに持つグループID一覧
  const propToGroupIds={};
  groups.forEach(g=>{
    (g.memberPropNames||[]).forEach(p=>{
      (propToGroupIds[p]=propToGroupIds[p]||[]).push(g.id);
    });
  });

  function ensureEntry(gid, idx){
    const g=groups.find(x=>x.id===gid);
    m.values.__groups[gid]=m.values.__groups[gid]||[];
    while(m.values.__groups[gid].length<=idx){
      const empty={}; (g.memberPropNames||[]).forEach(p=>{ empty[p]=''; });
      m.values.__groups[gid].push(empty);
    }
    return m.values.__groups[gid][idx];
  }

  Object.keys(propToGroupIds).forEach(propName=>{
    const gids=propToGroupIds[propName];

    // (1) 通常項目（単独）と、この項目名を持つグループとの間ですり合わせる
    const standaloneVal=m.values[propName];
    if(standaloneVal){
      // 単独項目に値があれば、各グループの1件目へコピー（無ければ作る）
      gids.forEach(gid=>{ ensureEntry(gid, 0)[propName]=standaloneVal; });
    }else{
      // 単独項目が空なら、いずれかのグループの1件目に値があれば単独項目側へコピー
      for(const gid of gids){
        const entries=m.values.__groups[gid];
        const v=entries && entries[0] && entries[0][propName];
        if(v){ m.values[propName]=v; break; }
      }
    }

    // (2) 複数グループにまたがる場合、行番号ごとに値をつき合わせる
    if(gids.length>1){
      let maxLen=0;
      gids.forEach(gid=>{
        const len=(m.values.__groups[gid]||[]).length;
        if(len>maxLen) maxLen=len;
      });
      for(let idx=0; idx<maxLen; idx++){
        let winner='';
        for(const gid of gids){
          const entries=m.values.__groups[gid];
          const v=entries && entries[idx] && entries[idx][propName];
          if(v){ winner=v; break; }
        }
        if(!winner) continue;
        gids.forEach(gid=>{ ensureEntry(gid, idx)[propName]=winner; });
      }
    }
  });
}
// 繰り返し行のどのエントリを編集中かを覚えておき、そのエントリの値をプレビューに反映する
function setActiveGroupEntry(groupId, idx){
  const m=state.make;
  m.activeGroupEntryIndex=m.activeGroupEntryIndex||{};
  m.activeGroupEntryIndex[groupId]=idx;
  const g=(m.template.repeatGroups||[]).find(x=>x.id===groupId);
  if(!g) return;
  const entry=(m.values.__groups[groupId]||[])[idx]||{};
  g.memberPropNames.forEach(p=>updateMakePreviewValue(p, entry[p]||''));
}

/* ---- JSONファイルからフォーマットをインポート（既存とはIDを分けて追加） ---- */
async function importTemplates(file){
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    const list = Array.isArray(data) ? data : (Array.isArray(data.templates) ? data.templates : null);
    if(!list) throw new Error('フォーマット形式のJSONではありません');
    let added=0;
    list.forEach(t=>{
      if(!t || !t.name || !t.fileType || !t.fileBase64 || !Array.isArray(t.variables)) return; // 不正なレコードはスキップ
      state.templates.push({
        id: uid(), // IDは必ず振り直し、既存フォーマットと衝突させない
        name: String(t.name), fileType: t.fileType, fileBase64: t.fileBase64,
        variables: t.variables,
        repeatGroups: Array.isArray(t.repeatGroups) ? t.repeatGroups : [] // 繰り返し行グループの定義も引き継ぐ（欠落するとグループ解除状態のまま再グループ化もできなくなる不具合の原因だった）
      });
      added++;
    });
    if(!added){ toast('取り込めるフォーマットが見つかりませんでした', true); return; }
    saveTemplates();
    viewTemplates(document.getElementById('app'));
    toast(`${added}件のフォーマットを取り込みました`);
  }catch(e){ toast('インポートに失敗しました: '+e.message, true); }
}

function viewHistory(app){
  app.innerHTML = `

      <h1>生成履歴</h1>

  };

  state.history.forEach(h=>{

async function startTemplateEdit(id){
  const t=state.templates.find(x=>x.id===id);
  if(!t){ toast('フォーマットが見つかりません', true); return; }
  const validGroupIds=new Set((t.repeatGroups||[]).map(g=>g.id));
  const orphanedCount=(t.variables||[]).filter(v=>v.repeatGroupId && !validGroupIds.has(v.repeatGroupId)).length;
  const d={ name:t.name, fileType:t.fileType, fileBase64:t.fileBase64, previewHtml:'', workbook:null,
    variables:t.variables.map(v=>{
      // 参照先のグループ定義が存在しない（インポート等で欠落した）場合は、通常項目として扱えるよう解除する
      const orphaned = v.repeatGroupId && !validGroupIds.has(v.repeatGroupId);
      return { key:uid(), propName:v.propName, originalText:v.originalText,
        occurrence:(v.occurrence!=null?v.occurrence:0), sheet:v.sheet||undefined, addr:v.addr||undefined,
        repeatGroupId: orphaned ? null : (v.repeatGroupId||null), repeatRole: orphaned ? null : (v.repeatRole||null) };
    }),
    repeatGroups:(t.repeatGroups||[]).map(g=>({...g})),
    groupSelection:[],
    maskMode:'add', editId:t.id };
  // anchorKey は前回の編集セッション時点のキーを指しているため、
  // 変数のキーを振り直した今、そのグループの実際のメンバーを見つけて再設定する
  // （一覧内の並び順に使うためのもので、放置すると常に無効な参照になってしまう）
  d.repeatGroups.forEach(g=>{
    const firstMemberName=g.memberPropNames[0];
    const anchorVar=d.variables.find(v=>v.repeatGroupId===g.id && v.propName===firstMemberName)
      || d.variables.find(v=>v.repeatGroupId===g.id);
    g.anchorKey=anchorVar?anchorVar.key:null;
  });
  state.draft=d;
  try{
    loading(true,'フォーマットを読み込み中…');
    const ab=base64ToAb(t.fileBase64);
    if(t.fileType==='docx'){
      const result=await mammoth.convertToHtml({arrayBuffer:ab});
      d.previewHtml=result.value;
    }else{
      d.workbook=XLSX.read(ab,{type:'array'});
    }
    loading(false);
    go('templateNew');
    if(orphanedCount) toast(`注意: ${orphanedCount}件の項目で繰り返し行の情報が失われていたため、通常項目として復元しました。必要であれば再度グループ化してください。`, true);
  }catch(e){ loading(false); toast('読み込みに失敗しました: '+e.message, true); }

async function handleTemplateFile(file){
  const d=state.draft;

  try{

/* ---- docx マスク ---- */
// マスクした「その出現位置」だけをハイライトする（同一文言の他の箇所は色付けしない）
function renderDocxPreview(body){
  const d=state.draft;
  body.innerHTML=d.previewHtml;
  // テキストノードを文書順に集め、各ノードの開始オフセットを記録
  const walker=document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
  const nodes=[]; let n; while((n=walker.nextNode())) nodes.push(n);
  const starts=[]; let acc=0;
  nodes.forEach(nd=>{ starts.push(acc); acc+=nd.nodeValue.length; });
  const full=nodes.map(nd=>nd.nodeValue).join('');
  // 各変数について、対象の出現位置[start,end)を求め、ノードごとに切り出して包む
  const pieceMap=new Map();
  d.variables.forEach(v=>{
    const positions=allIndexOf(full, v.originalText);
    const occ=(v.occurrence!=null?v.occurrence:0);
    const start=positions[occ];
    if(start==null) return; // 見つからなければ色付けしない
    const end=start+v.originalText.length;
    for(let i=0;i<nodes.length;i++){
      const ns=starts[i], ne=ns+nodes[i].nodeValue.length;
      const s=Math.max(start,ns), e=Math.min(end,ne);
      if(s<e){
        if(!pieceMap.has(nodes[i])) pieceMap.set(nodes[i],[]);
        pieceMap.get(nodes[i]).push({s:s-ns,e:e-ns,key:v.key});
      }
    }
  });
  pieceMap.forEach((pieces,node)=>wrapNodePieces(node,pieces));
}
// 1つのテキストノード内の複数区間をまとめて <span class="mask"> で包む
function wrapNodePieces(node, pieces){
  pieces.sort((a,b)=>a.s-b.s);
  const text=node.nodeValue;
  const frag=document.createDocumentFragment();
  let cur=0;
  pieces.forEach(p=>{
    if(p.s<cur) return;            // 区間が重なる場合はスキップ
    if(p.s>cur) frag.appendChild(document.createTextNode(text.slice(cur,p.s)));
    const span=document.createElement('span'); span.className='mask'; span.dataset.key=p.key;
    span.textContent=text.slice(p.s,p.e); frag.appendChild(span);
    cur=p.e;
  });
  if(cur<text.length) frag.appendChild(document.createTextNode(text.slice(cur)));
  node.parentNode.replaceChild(frag,node);
}
// 鉛筆モードで選択終了時に呼ばれる。選択が無ければ静かに何もしない。
function tryAddDocxMaskFromSelection(){
  const body=document.getElementById('previewBody');
  if(!body) return;
  const sel=window.getSelection();
  if(!sel || !sel.rangeCount) return;
  const raw=sel.toString();
  if(!raw || !raw.trim()) return;                    // 選択なし → 無視
  const range=sel.getRangeAt(0);
  if(!body.contains(range.startContainer)) return;   // プレビュー外 → 無視
  // 既存マスクの内側だけを選択した場合は追加しない（除去はクリックで行う）
  const text=raw.trim();
  const full=previewFullText(body);
  const selStart=globalStartOffset(body, range);
  let matchStart = selStart>=0 ? full.indexOf(text, Math.max(0, selStart)) : -1;
  if(matchStart<0) matchStart = full.indexOf(text);
  if(matchStart<0){ sel.removeAllRanges(); return; }
  const occurrence=countOcc(full, text, matchStart);
  if(state.draft.variables.some(v=>v.originalText===text && v.occurrence===occurrence)){
    sel.removeAllRanges();
    toast('その箇所はすでにマスク済みです', true);
    return;
  }
  state.draft.variables.push({ key:uid(), originalText:text, occurrence, propName:'' });
  sel.removeAllRanges();
  renderDocxPreview(body);
  applyMaskModeUI();
  refreshVarList();
}
// プレビュー内の全テキストを文書順に連結
function previewFullText(root){
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let s='', n; while((n=walker.nextNode())) s+=n.nodeValue; return s;
}
// 選択開始位置をプレビュー全体の文字オフセットに変換
function globalStartOffset(root, range){
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let offset=0, node;
  while((node=walker.nextNode())){
    if(node===range.startContainer) return offset + range.startOffset;
    offset += node.nodeValue.length;
  }
  return -1;
}
// endPosより前にneedleが何回出現するか（＝0始まりの出現番号）
function countOcc(hay, needle, endPos){
  let c=0, i=0;
  while((i=hay.indexOf(needle,i))>=0 && i<endPos){ c++; i+=needle.length; }
  return c;
}
function allIndexOf(hay, needle){ const r=[]; if(!needle) return r; let i=0; while((i=hay.indexOf(needle,i))>=0){ r.push(i); i+=needle.length; } return r; }

/* ============================================================
   繰り返し行／表（担当者ごとに行・列を増減する）エンジン
   ------------------------------------------------------------
   ・「行グループ」: 1行内の複数マスクをまとめて、件数分だけ
     <w:tr> を複製／削除する（例：乙の業務担当者一覧、実施期間）。
   ・「表グループ」: 見出し行の1マスク（列側）と、本体行の
     行ラベル用マスク／セル用マスクの3つを指定し、行×列の
     二次元で <w:tc>（と <w:gridCol>）を複製／削除する（例：委託料）。
   どちらも「テンプレート保存時」に、対象テーブルを
   『固定部分＋繰り返し単位1つ』まで刈り込み（trim）ておき、
   「契約書作成時」にその1単位を必要な件数へ複製（expand）する。
============================================================ */
function rgFullTextOf(nodes){ return Array.prototype.map.call(nodes, n=>n.textContent).join(''); }
function rgAncestorByTag(node, tag){ let n=node; while(n && n.nodeName!==tag) n=n.parentNode; return n; }
function rgFindRunNodeForText(doc, originalText, occurrence){
  const runs=[...doc.getElementsByTagName('w:t')];
  const full=runs.map(n=>n.textContent).join('');
  const positions=allIndexOf(full, originalText);
  const occ=occurrence||0;
  if(occ>=positions.length) return null;
  const start=positions[occ];
  let pos=0;
  for(const r of runs){ const len=r.textContent.length; if(start<pos+len) return r; pos+=len; }
  return null;
}
function rgReplaceFirstInScope(scopeNode, originalText, value){
  const ts=[...scopeNode.getElementsByTagName('w:t')];
  const full=ts.map(n=>n.textContent).join('');
  const idx=full.indexOf(originalText);
  if(idx<0) return false;
  const runs=ts.map(node=>({node}));
  return replaceRangeInRuns(runs, idx, idx+originalText.length, value);
}
function rgRowContainsText(trNode, text){ return rgFullTextOf(trNode.getElementsByTagName('w:t')).indexOf(text)>=0; }
function rgTcChildren(trNode){ return [...trNode.childNodes].filter(n=>n.nodeName==='w:tc'); }
function rgGridColChildren(tblGridNode){ return [...tblGridNode.childNodes].filter(n=>n.nodeName==='w:gridCol'); }
function rgTrChildren(tblNode){ return [...tblNode.childNodes].filter(n=>n.nodeName==='w:tr'); }

function rgResolveRowAnchor(doc, anchorText, anchorOcc){
  const t=rgFindRunNodeForText(doc, anchorText, anchorOcc);
  if(!t) return null;
  return rgAncestorByTag(t, 'w:tr');
}
function rgCommitTrimRowGroup(anchorText, trNode){
  const tbl=trNode.parentNode;
  rgTrChildren(tbl).forEach(s=>{
    if(s===trNode) return;
    if(rgRowContainsText(s, anchorText)) tbl.removeChild(s);
  });
}
function rgExpandRowGroup(trNode, memberTextsInOrder, entries){
  const tbl=trNode.parentNode;
  const newRows=entries.map(entry=>{
    const clone=trNode.cloneNode(true);
    memberTextsInOrder.forEach((text,i)=>rgReplaceFirstInScope(clone, text, entry[i]||''));
    return clone;
  });
  newRows.forEach(r=>tbl.insertBefore(r, trNode));
  tbl.removeChild(trNode);
  return newRows;
}
/* ---- プレビュー（mammothのHTML）のテキストノードを文書順に集め、各ノードの開始オフセットを記録する ---- */
function previewTextMap(root){
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes=[]; let n; while((n=walker.nextNode())) nodes.push(n);
  const starts=[]; let acc=0;
  nodes.forEach(nd=>{ starts.push(acc); acc+=nd.nodeValue.length; });
  const full=nodes.map(nd=>nd.nodeValue).join('');
  return { nodes, starts, full };
}
/* 指定した要素（例：<tr>）が包含するテキスト全体の [start,end) を previewTextMap 基準で返す */
function previewRangeOfNode(el, map){
  const walker=document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  let first=null, last=null, n;
  while((n=walker.nextNode())){ if(!first) first=n; last=n; }
  if(!first) return null;
  const si=map.nodes.indexOf(first), li=map.nodes.indexOf(last);
  if(si<0||li<0) return null;
  return [ map.starts[si], map.starts[li]+map.nodes[li].nodeValue.length ];
}
/* ============================================================
   簡易テンプレート編集（文言修正・表の行/列の追加削除）
   ------------------------------------------------------------
   プレビュー（mammothのHTML）上の要素と、実ファイル（document.xml）側の
   対応する要素は、「何番目の表か」「その中の何番目の行/セルか」という
   構造上の並び順で対応づける（文言の一致ではなく構造の一致に頼ることで、
   同じ文言が繰り返し出てくる場合の取り違えを避ける）。
   構造編集のあとは、必ず「編集前のプレビュー上の文字位置」を基準に、
   各マスクの新しい出現位置を再計算する（実ファイルのXML構造の違いに
   影響されないようにするため）。
============================================================ */
// プレビュー上の要素が、何番目の表の何番目の行／セルかを求める
function previewTableRowIndex(trEl){
  const table=trEl.closest('table');
  if(!table) return null;
  const body=document.getElementById('previewBody');
  const allTables=[...body.querySelectorAll('table')];
  const tableIndex=allTables.indexOf(table);
  const rows=[...table.children].find(c=>c.tagName==='TBODY') ? [...table.querySelector('tbody').children] : [...table.children].filter(c=>c.tagName==='TR');
  const rowIndex=rows.indexOf(trEl);
  return { tableIndex, rowIndex, rowCount: rows.length };
}
function previewTableCellIndex(tdEl){
  const tr=tdEl.closest('tr');
  const rowInfo=previewTableRowIndex(tr);
  if(!rowInfo) return null;
  const cells=[...tr.children].filter(c=>c.tagName==='TD'||c.tagName==='TH');
  const colIndex=cells.indexOf(tdEl);
  return { ...rowInfo, colIndex, colCount: cells.length };
}
// 実ファイル（document.xml）側で、何番目の表の何番目の行/セルかを構造的に特定する
function rawNthTable(doc, tableIndex){
  const all=[...doc.getElementsByTagName('w:tbl')];
  return all[tableIndex] || null;
}
function rawTableRows(tbl){
  return [...tbl.childNodes].filter(n=>n.nodeName==='w:tr');
}
function rawRowCells(tr){
  return [...tr.childNodes].filter(n=>n.nodeName==='w:tc');
}
/* ---- 編集前のプレビュー時点での全マスクの文字位置を記録し、構造編集後に
   挿入／削除された範囲ぶんだけ位置をずらして、新しい出現位置を求め直す ---- */
function captureVarPositions(d, mapOld){
  const positions={};
  d.variables.forEach(v=>{
    if(v.addr) return;
    const list=allIndexOf(mapOld.full, v.originalText);
    positions[v.key]=list[v.occurrence||0];
  });
  return positions;
}
function reconcileVarPositions(d, oldPositions, changedRanges, mapNew){
  // changedRanges: [{start, oldLen, newLen}] 編集前のプレビュー座標系での変更範囲（挿入はoldLen=0、削除はnewLen=0）
  const dropped=[];
  d.variables.forEach(v=>{
    if(v.addr) return;
    const oldPos=oldPositions[v.key];
    if(oldPos==null){ dropped.push(v); return; }
    const inside=changedRanges.some(r=>oldPos>=r.start && oldPos<r.start+r.oldLen && r.oldLen>0);
    if(inside){ dropped.push(v); return; }
    let shift=0;
    changedRanges.forEach(r=>{ if(r.start<=oldPos) shift += (r.newLen-r.oldLen); });
    const newPos=oldPos+shift;
    const newOcc=allIndexOf(mapNew.full, v.originalText).indexOf(newPos);
    if(newOcc<0){ dropped.push(v); return; }
    v.occurrence=newOcc;
  });
  if(dropped.length){
    const dropKeys=new Set(dropped.map(v=>v.key));
    d.variables=d.variables.filter(v=>!dropKeys.has(v.key));
    dropped.forEach(v=>{
      if(!v.repeatGroupId) return;
      const g=(d.repeatGroups||[]).find(x=>x.id===v.repeatGroupId);
      if(g) g.memberPropNames=g.memberPropNames.filter(p=>p!==v.propName);
    });
    d.repeatGroups=(d.repeatGroups||[]).filter(g=>g.memberPropNames.length>0);
    if(d.groupSelection) d.groupSelection=d.groupSelection.filter(k=>!dropKeys.has(k));
  }
  return dropped.map(v=>v.propName);
}
/* ---- 構造編集を1件実行する共通処理：編集前の位置を記録→XMLを編集→ファイル書き戻し→
   新プレビュー生成→マスク位置の再計算、をまとめて行う ---- */
async function runTemplateStructuralEdit(mutateFn){
  const d=state.draft;
  const previewBody=document.getElementById('previewBody');
  const mapOld=previewTextMap(previewBody);
  const zip=new PizZip(base64ToAb(d.fileBase64));
  const doc=new DOMParser().parseFromString(zip.file('word/document.xml').asText(),'application/xml');
  const changedRanges=mutateFn(doc, mapOld) || [];
  const out=new XMLSerializer().serializeToString(doc);
  zip.file('word/document.xml', out);
  const blob=zip.generate({type:'blob'});
  const ab=await blob.arrayBuffer();
  d.fileBase64=abToBase64(ab);
  const preview=await mammoth.convertToHtml({arrayBuffer:ab});
  d.previewHtml=preview.value;
  const tmp=document.createElement('div'); tmp.style.cssText='position:absolute;left:-99999px;top:-99999px;visibility:hidden';
  tmp.innerHTML=d.previewHtml;
  document.body.appendChild(tmp);
  const mapNew=previewTextMap(tmp);
  document.body.removeChild(tmp);
  const oldPositions=captureVarPositions(d, mapOld);
  const droppedNames=reconcileVarPositions(d, oldPositions, changedRanges, mapNew);
  return { droppedNames };
}
/* ---- 表の行を複製して上/下に追加する ---- */
async function addTableRow(trEl, insertBelow){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{ await addTableRow_(trEl, insertBelow); } finally { _structuralEditBusy = false; }
}
async function addTableRow_(trEl, insertBelow){
  const info=previewTableRowIndex(trEl);
  if(!info) return;
  const previewBody=document.getElementById('previewBody');
  const mapOld=previewTextMap(previewBody);
  const range=previewRangeOfNode(trEl, mapOld);
  if(!range) return;
  try{
    loading(true,'行を追加しています…');
    const { droppedNames } = await runTemplateStructuralEdit((doc)=>{
      const tbl=rawNthTable(doc, info.tableIndex);
      if(!tbl) throw new Error('対象の表が見つかりませんでした');
      const rows=rawTableRows(tbl);
      const srcRow=rows[info.rowIndex];
      if(!srcRow) throw new Error('対象の行が見つかりませんでした');
      const clone=srcRow.cloneNode(true);
      if(insertBelow){ tbl.insertBefore(clone, srcRow.nextSibling); }
      else{ tbl.insertBefore(clone, srcRow); }
      const insertPos = insertBelow ? range[1] : range[0];
      const len = range[1]-range[0];
      return [{ start: insertPos, oldLen:0, newLen: len }];
    });
    loading(false);
    if(droppedNames.length) toast('注意: '+droppedNames.join('、')+' が無効になりました。再度マスクしてください。', true);
    else toast('行を追加しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('行の追加に失敗しました: '+e.message, true); }
}
/* ---- 表の行を削除する（最低1行は残す） ---- */
async function deleteTableRow(trEl){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{ await deleteTableRow_(trEl); } finally { _structuralEditBusy = false; }
}
async function deleteTableRow_(trEl){
  const info=previewTableRowIndex(trEl);
  if(!info) return;
  if(info.rowCount<=1){ toast('最後の1行は削除できません', true); return; }
  if(!confirm('この行を削除します。よろしいですか？')) return;
  const previewBody=document.getElementById('previewBody');
  const mapOld=previewTextMap(previewBody);
  const range=previewRangeOfNode(trEl, mapOld);
  if(!range) return;
  try{
    loading(true,'行を削除しています…');
    const { droppedNames } = await runTemplateStructuralEdit((doc)=>{
      const tbl=rawNthTable(doc, info.tableIndex);
      if(!tbl) throw new Error('対象の表が見つかりませんでした');
      const rows=rawTableRows(tbl);
      const row=rows[info.rowIndex];
      if(!row) throw new Error('対象の行が見つかりませんでした');
      tbl.removeChild(row);
      return [{ start: range[0], oldLen: range[1]-range[0], newLen: 0 }];
    });
    loading(false);
    if(droppedNames.length) toast('注意: '+droppedNames.join('、')+' が削除した行に含まれていたため無効になりました。', true);
    else toast('行を削除しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('行の削除に失敗しました: '+e.message, true); }
}
/* ---- 表の列を複製して左/右に追加する ---- */
async function addTableColumn(tdEl, insertRight){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{ await addTableColumn_(tdEl, insertRight); } finally { _structuralEditBusy = false; }
}
async function addTableColumn_(tdEl, insertRight){
  const info=previewTableCellIndex(tdEl);
  if(!info) return;
  const previewBody=document.getElementById('previewBody');
  const table=tdEl.closest('table');
  const rowsEl=[...table.querySelectorAll('tr')];
  const mapOld=previewTextMap(previewBody);
  const changedRanges=[];
  rowsEl.forEach(tr=>{
    const cells=[...tr.children].filter(c=>c.tagName==='TD'||c.tagName==='TH');
    const cell=cells[info.colIndex];
    if(!cell) return;
    const r=previewRangeOfNode(cell, mapOld);
    if(r) changedRanges.push({ start: insertRight?r[1]:r[0], oldLen:0, newLen:(r[1]-r[0]) });
  });
  try{
    loading(true,'列を追加しています…');
    const { droppedNames } = await runTemplateStructuralEdit((doc)=>{
      const tbl=rawNthTable(doc, info.tableIndex);
      if(!tbl) throw new Error('対象の表が見つかりませんでした');
      const tblGrid=[...tbl.childNodes].find(n=>n.nodeName==='w:tblGrid');
      if(tblGrid){
        const cols=[...tblGrid.childNodes].filter(n=>n.nodeName==='w:gridCol');
        const srcCol=cols[info.colIndex];
        if(srcCol){
          const cloneCol=srcCol.cloneNode(true);
          tblGrid.insertBefore(cloneCol, insertRight?srcCol.nextSibling:srcCol);
        }
      }
      rawTableRows(tbl).forEach(tr=>{
        const cells=rawRowCells(tr);
        const srcCell=cells[info.colIndex];
        if(!srcCell) return;
        const cloneCell=srcCell.cloneNode(true);
        tr.insertBefore(cloneCell, insertRight?srcCell.nextSibling:srcCell);
      });
      return changedRanges;
    });
    loading(false);
    if(droppedNames.length) toast('注意: '+droppedNames.join('、')+' が無効になりました。再度マスクしてください。', true);
    else toast('列を追加しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('列の追加に失敗しました: '+e.message, true); }
}
/* ---- 表の列を削除する（最低1列は残す） ---- */
async function deleteTableColumn(tdEl){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{ await deleteTableColumn_(tdEl); } finally { _structuralEditBusy = false; }
}
async function deleteTableColumn_(tdEl){
  const info=previewTableCellIndex(tdEl);
  if(!info) return;
  if(info.colCount<=1){ toast('最後の1列は削除できません', true); return; }
  if(!confirm('この列を削除します。よろしいですか？')) return;
  const previewBody=document.getElementById('previewBody');
  const table=tdEl.closest('table');
  const rowsEl=[...table.querySelectorAll('tr')];
  const mapOld=previewTextMap(previewBody);
  const changedRanges=[];
  rowsEl.forEach(tr=>{
    const cells=[...tr.children].filter(c=>c.tagName==='TD'||c.tagName==='TH');
    const cell=cells[info.colIndex];
    if(!cell) return;
    const r=previewRangeOfNode(cell, mapOld);
    if(r) changedRanges.push({ start:r[0], oldLen:(r[1]-r[0]), newLen:0 });
  });
  try{
    loading(true,'列を削除しています…');
    const { droppedNames } = await runTemplateStructuralEdit((doc)=>{
      const tbl=rawNthTable(doc, info.tableIndex);
      if(!tbl) throw new Error('対象の表が見つかりませんでした');
      const tblGrid=[...tbl.childNodes].find(n=>n.nodeName==='w:tblGrid');
      if(tblGrid){
        const cols=[...tblGrid.childNodes].filter(n=>n.nodeName==='w:gridCol');
        const col=cols[info.colIndex];
        if(col) tblGrid.removeChild(col);
      }
      rawTableRows(tbl).forEach(tr=>{
        const cells=rawRowCells(tr);
        const cell=cells[info.colIndex];
        if(cell) tr.removeChild(cell);
      });
      return changedRanges;
    });
    loading(false);
    if(droppedNames.length) toast('注意: '+droppedNames.join('、')+' が削除した列に含まれていたため無効になりました。', true);
    else toast('列を削除しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('列の削除に失敗しました: '+e.message, true); }
}
// 文言修正用の複数行対応テキスト編集モーダル（ネイティブのprompt()は改行を入力できないため）。
// OKで新しい文字列、キャンセル/未変更でnullを返す。
function showTextEditModal(title, initialText){
  return new Promise(resolve=>{
    const bd=document.getElementById('backdrop');
    bd.innerHTML=`
      <div class="modal" style="max-width:520px">
        <div class="modal-head"><h2>${esc(title)}</h2><p class="hint" style="margin:4px 0 0">改行を含めて自由に編集できます。</p></div>
        <div class="modal-body">
          <textarea id="textEditArea" rows="6" style="width:100%;resize:vertical;font:inherit;padding:10px;border:1px solid var(--line);border-radius:8px;box-sizing:border-box"></textarea>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" id="textEditCancel">キャンセル</button>
          <button class="btn" id="textEditOk">${icon('checkCircle',15)} 反映する</button>
        </div>
      </div>`;
    const ta=document.getElementById('textEditArea');
    ta.value=initialText;
    bd.classList.add('show');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    function finish(result){ bd.classList.remove('show'); resolve(result); }
    document.getElementById('textEditCancel').onclick=()=>finish(null);
    document.getElementById('textEditOk').onclick=()=>finish(ta.value);
  });
}
// 編集前後のプレビュー全文を比較し、「実際に変わった範囲」を直接検出する。
// 共通する先頭部分・共通する末尾部分をそれぞれ突き合わせて除外し、残った中央部分を
// {start, oldLen, newLen} として返す（reconcileVarPositions にそのまま渡せる形式）。
// 文字数を計算で見積もる方式と違い、mammothが改行やその他の要素をどう描画するかに
// 依存せず、常に実際の描画結果に基づいた正しいズレ量を得られる。
function diffTextRange(oldFull, newFull){
  const minLen=Math.min(oldFull.length, newFull.length);
  let start=0;
  while(start<minLen && oldFull[start]===newFull[start]) start++;
  let oldEnd=oldFull.length, newEnd=newFull.length;
  while(oldEnd>start && newEnd>start && oldFull[oldEnd-1]===newFull[newEnd-1]){
    oldEnd--; newEnd--;
  }
  return { start, oldLen: oldEnd-start, newLen: newEnd-start };
}
// 段落の文言修正で改行(\n)が含まれていた場合に、元の段落と同じ段落設定(pPr)・
// 文字書式(rPr)を引き継いだ新しい段落として分割する。
// lines[0]は既存の段落（editが指す範囲）にそのまま書き込み、lines[1]以降は
// 元の段落を複製した新しい<w:p>として、直後に順番に挿入する。
function splitParagraphAtEdit(doc, edit, lines){
  applyRunEdit(edit, lines[0]);
  const paragraph=rgAncestorByTag(edit.startNode, 'w:p');
  if(!paragraph) return; // 段落が見つからない場合は、これ以上の行は先頭行に連結されたままにする
  const pPrSource=paragraph.getElementsByTagName('w:pPr')[0];
  const editedRun=rgAncestorByTag(edit.startNode, 'w:r');
  const rPrSource=editedRun ? editedRun.getElementsByTagName('w:rPr')[0] : null;
  let refNode=paragraph;
  for(let i=1;i<lines.length;i++){
    const newP=doc.createElement('w:p');
    if(pPrSource) newP.appendChild(pPrSource.cloneNode(true));
    const newR=doc.createElement('w:r');
    if(rPrSource) newR.appendChild(rPrSource.cloneNode(true));
    const newT=doc.createElement('w:t');
    newT.setAttribute('xml:space','preserve');
    newT.textContent=lines[i];
    newR.appendChild(newT);
    newP.appendChild(newR);
    refNode.parentNode.insertBefore(newP, refNode.nextSibling);
    refNode=newP;
  }
}
/* ---- 段落の文言修正（マスクを含まない段落のみ、直接テキストを書き換えられるようにする） ---- */
async function editParagraphText(pEl){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{ await editParagraphText_(pEl); } finally { _structuralEditBusy = false; }
}
async function editParagraphText_(pEl){
  if(pEl.querySelector('.mask')){ toast('マスクを含む段落は直接編集できません。マスクを解除してから編集してください。', true); return; }
  const previewBody=document.getElementById('previewBody');
  const mapOld=previewTextMap(previewBody);
  const range=previewRangeOfNode(pEl, mapOld);
  if(!range) return;
  const oldText=mapOld.full.slice(range[0], range[1]);
  const newText=await showTextEditModal('文言を修正してください', oldText);
  if(newText==null || newText===oldText) return;
  try{
    loading(true,'文言を修正しています…');
    const d=state.draft;
    const zip=new PizZip(base64ToAb(d.fileBase64));
    const doc=new DOMParser().parseFromString(zip.file('word/document.xml').asText(),'application/xml');
    // 段落中のすべてのrunを対象に、最初のrunへ新しい文言をまとめ、他は空にする
    const runs=[...doc.getElementsByTagName('w:t')];
    const full=runs.map(r=>r.textContent).join('');
    // 重要：同じ文言が文書内に複数箇所ある場合（「同じ値として結合」されているマスクの1つを
    // 解除して、その部分だけ直接編集するようなケース）、単純に最初に見つかった箇所を書き換えると、
    // 実際にクリックした段落とは別の（まだマスクされたままの）箇所を誤って書き換えてしまい、
    // 結合されていた他の部分が変わったように見えるバグになる。
    // → プレビュー側で「その文言の何番目の出現か」を求め、実ファイル側でも同じ番目の出現を
    //   対象にすることで、クリックした段落だけを確実に編集する。
    const occInPreview=allIndexOf(mapOld.full, oldText).indexOf(range[0]);
    const rawPositions=allIndexOf(full, oldText);
    const start=rawPositions[occInPreview>=0?occInPreview:0];
    if(start==null) throw new Error('対象の段落が見つかりませんでした');
    const edit=resolveRangeToRunEdit(runs.map(node=>({node})), start, start+oldText.length);
    if(!edit) throw new Error('対象の段落が見つかりませんでした');
    // 改行(\n)を含む場合は、単なる段落内の折り返し（<w:br/>）ではなく、
    // 元の段落と同じ段落設定（インデント・配置など）・文字書式を引き継いだ
    // 「新しい段落」として分割する（Wordでいう改行＝Enterキーの挙動に合わせる）。
    const lines=newText.split('\n');
    if(lines.length<=1){
      applyRunEdit(edit, newText);
    }else{
      splitParagraphAtEdit(doc, edit, lines);
    }
    const out=new XMLSerializer().serializeToString(doc);
    zip.file('word/document.xml', out);
    const blob=zip.generate({type:'blob'});
    const ab=await blob.arrayBuffer();
    d.fileBase64=abToBase64(ab);
    const preview=await mammoth.convertToHtml({arrayBuffer:ab});
    d.previewHtml=preview.value;
    const tmp=document.createElement('div'); tmp.style.cssText='position:absolute;left:-99999px;top:-99999px;visibility:hidden';
    tmp.innerHTML=d.previewHtml;
    document.body.appendChild(tmp);
    const mapNew=previewTextMap(tmp);
    document.body.removeChild(tmp);
    const oldPositions=captureVarPositions(d, mapOld);
    // 重要：改行(\n)を含む文言に修正した場合、プレビュー（mammothでHTML化したもの）側では
    // 改行が<br>タグ（またはpの分割）になり、previewTextMapが見るテキストノードには
    // 改行そのものの文字は含まれない。そのため「新しい文言の文字数」から機械的に
    // ズレ量を計算すると、改行の扱われ方次第で数が合わなくなり、後続の他のマスクの位置を
    // 誤検出して「無効になった」と誤判定する原因になっていた。
    // → 文字数を計算で見積もるのではなく、編集前後のプレビュー全文（mapOld.full / mapNew.full）
    //   を実際に比較し、共通する先頭・末尾を除いた「本当に変わった範囲」を直接検出する。
    //   これならmammothが改行をどう描画するかに関わらず、実際の描画結果に基づいて
    //   常に正しいズレ量を計算できる。
    const changeRange=diffTextRange(mapOld.full, mapNew.full);
    const droppedNames=reconcileVarPositions(d, oldPositions, [changeRange], mapNew);
    loading(false);
    if(droppedNames.length) toast('注意: '+droppedNames.join('、')+' が無効になりました。再度マスクしてください。', true);
    else toast('文言を修正しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('修正に失敗しました: '+e.message, true); }
}

// 構造編集系の処理（行グループ化・表の行列編集など）が二重に走らないようにするためのフラグ。
// ボタンの連打やクリックの取りこぼしで、同じ操作が2回実行され「複製されたグループ」等が
// できてしまう不具合を防ぐ。
let _structuralEditBusy = false;
async function createRowGroup(memberKeys){
  if(_structuralEditBusy) return;
  _structuralEditBusy = true;
  try{
    await createRowGroup_(memberKeys);
  } finally {
    _structuralEditBusy = false;
  }
}
async function createRowGroup_(memberKeys){
  const d=state.draft;
  if(!memberKeys || !memberKeys.length) return;
  const memberVars=memberKeys.map(k=>d.variables.find(v=>v.key===k)).filter(Boolean);
  if(!memberVars.length){ toast('項目が見つかりません', true); return; }
  const first=memberVars[0];
  const previewBody=document.getElementById('previewBody');
  if(!previewBody){ toast('プレビューが見つかりません', true); return; }
  const label=(prompt('この繰り返し行の名前を入力してください（例：業務担当者）', first.propName)||'').trim() || first.propName;
  try{
    loading(true, '行を複製できるように整えています…');

    // 1) 現在のプレビュー上で、対象マスクを含む行と「他の記入例行」を特定する
    const mapOld=previewTextMap(previewBody);
    const anchorSpan=previewBody.querySelector(`.mask[data-key="${first.key}"]`);
    if(!anchorSpan) throw new Error('プレビュー上でマスクが見つかりませんでした');
    const anchorTr=anchorSpan.closest('tr');
    if(!anchorTr) throw new Error('対象の行が見つかりませんでした');
    const siblingRows = anchorTr.parentNode ? [...anchorTr.parentNode.children].filter(tr=>tr!==anchorTr && tr.tagName==='TR') : [];
    const removedRanges = siblingRows
      .filter(tr=>tr.textContent.indexOf(first.originalText)>=0)
      .map(tr=>previewRangeOfNode(tr, mapOld))
      .filter(Boolean)
      .sort((a,b)=>a[0]-b[0]);

    // 2) 今の時点での各変数のプレビュー内位置を記録しておく（docxのマスク変数のみ対象、キー単位で管理）
    const oldPositions={};
    d.variables.forEach(v=>{
      if(v.addr) return;
      const positions=allIndexOf(mapOld.full, v.originalText);
      oldPositions[v.key]=positions[v.occurrence||0];
    });

    // 3) 実ファイル（document.xml）側で、対象行を1行だけに刈り込む
    const zip=new PizZip(base64ToAb(d.fileBase64));
    const doc=new DOMParser().parseFromString(zip.file('word/document.xml').asText(),'application/xml');
    const trNode=rgResolveRowAnchor(doc, first.originalText, first.occurrence);
    if(!trNode) throw new Error('対象の行がファイル内で見つかりませんでした');
    rgCommitTrimRowGroup(first.originalText, trNode);
    const out=new XMLSerializer().serializeToString(doc);
    zip.file('word/document.xml', out);
    const blob=zip.generate({type:'blob'});
    const ab=await blob.arrayBuffer();
    d.fileBase64=abToBase64(ab);

    // 4) 新しいプレビューを生成し、非表示コンテナでテキスト位置マップを取得する
    const preview=await mammoth.convertToHtml({arrayBuffer:ab});
    d.previewHtml=preview.value;
    const tmp=document.createElement('div'); tmp.style.cssText='position:absolute;left:-99999px;top:-99999px;visibility:hidden';
    tmp.innerHTML=d.previewHtml;
    document.body.appendChild(tmp);
    const mapNew=previewTextMap(tmp);
    document.body.removeChild(tmp);

    // 5) 削除された行ぶんの文字数を差し引いて、各変数の新しい occurrence を求める（キーで対象を特定）
    const dropped=[];
    const droppedKeys=[];
    const memberKeySet=new Set(memberKeys);
    const recompute=(v)=>{
      const oldPos=oldPositions[v.key];
      if(oldPos==null){ dropped.push(v.propName); droppedKeys.push(v.key); return; }
      if(removedRanges.some(([s,e])=>oldPos>=s && oldPos<e)){ dropped.push(v.propName); droppedKeys.push(v.key); return; }
      const shift=removedRanges.filter(([s])=>s<=oldPos).reduce((sum,[s,e])=>sum+(e-s),0);
      const newPos=oldPos-shift;
      const newOcc=allIndexOf(mapNew.full, v.originalText).indexOf(newPos);
      if(newOcc<0){ dropped.push(v.propName); droppedKeys.push(v.key); return; }
      v.occurrence=newOcc;
    };
    d.variables.forEach(v=>{
      if(v.addr) return;
      if(memberKeySet.has(v.key)) return; // メンバーは後でまとめて処理する
      recompute(v);
    });
    memberVars.forEach(recompute);
    // プレビューから消えて無効になった項目は、変数としても残さず完全に削除する
    // （残しておくと、右の一覧には出ないのに内部データとしてだけ残る「幽霊項目」になってしまうため）
    if(droppedKeys.length){
      const dropSet=new Set(droppedKeys);
      const droppedVars=d.variables.filter(v=>dropSet.has(v.key));
      d.variables=d.variables.filter(v=>!dropSet.has(v.key));
      if(d.groupSelection) d.groupSelection=d.groupSelection.filter(k=>!dropSet.has(k));
      // 削除された項目が、他の繰り返し行グループのメンバーだった場合は、そちらの定義からも除く
      droppedVars.forEach(v=>{
        if(!v.repeatGroupId) return;
        const og=d.repeatGroups.find(x=>x.id===v.repeatGroupId);
        if(!og) return;
        og.memberPropNames=og.memberPropNames.filter(p=>p!==v.propName);
      });
      d.repeatGroups=d.repeatGroups.filter(g2=>g2.memberPropNames.length>0);
    }

    const groupId=uid();
    memberVars.forEach(v=>{ v.repeatGroupId=groupId; v.repeatRole='member'; });
    d.repeatGroups.push({ id:groupId, kind:'row', label, memberPropNames:memberVars.map(v=>v.propName), anchorKey:first.key });
    d.groupSelection=[];
    loading(false);
    if(dropped.length) toast('注意: '+dropped.join('、')+' が例示行の削除に伴い無効になりました。再度マスクしてください。', true);
    else toast('繰り返し行を設定しました');
    buildMaskArea();
  }catch(e){ loading(false); toast('設定に失敗しました: '+e.message, true); }
}
/* ---- xlsx マスク ---- */
function renderXlsxPreview(body){
  const d=state.draft;
  body.innerHTML='';
  d.workbook.SheetNames.forEach(sn=>{
    const ws=d.workbook.Sheets[sn]; if(!ws['!ref']) return;
    const range=XLSX.utils.decode_range(ws['!ref']);
    const maxR=Math.min(range.e.r, range.s.r+199);
    const label=document.createElement('div'); label.className='sheetname'; label.textContent=sn; body.appendChild(label);
    const tbl=document.createElement('table');
    for(let r=range.s.r;r<=maxR;r++){
      const tr=document.createElement('tr');
      for(let c=range.s.c;c<=range.e.c;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        const cell=ws[addr];
        const val=cell ? (cell.w!=null?cell.w:cell.v) : '';
        const td=document.createElement('td');
        td.textContent=val; td.title=val;
        td.dataset.sheet=sn; td.dataset.addr=addr;
        const existing=d.variables.find(v=>v.sheet===sn && v.addr===addr);
        if(existing){ td.classList.add('picked'); td.dataset.key=existing.key; }
        if(val!=='' && val!=null){
          td.onclick=()=>toggleCell(sn,addr,String(val),td);
        }
        tr.appendChild(td);
      }
      tbl.appendChild(tr);
    }
    body.appendChild(tbl);
  });
}
function toggleCell(sheet,addr,val,td){
  const d=state.draft;
  const i=d.variables.findIndex(v=>v.sheet===sheet && v.addr===addr);
  const mode=d.maskMode||'add';
  if(mode==='erase'){
    // 消しゴム：マスク済みのみ解除、未マスクは無視
    if(i>=0){ d.variables.splice(i,1); td.classList.remove('picked'); refreshVarList(); }
    return;
  }
  if(mode==='select'){
    // 選択モード：マスク済みのセルのみチェックのON/OFFを切り替える
    if(i>=0) toggleGroupSelectionForKey(d.variables[i].key);
    return;
  }
  // 鉛筆（追加）：未マスクなら追加。既にマスク済みならその項目を選択状態にする。
  if(i<0){
    const v={ key:uid(), sheet, addr, originalText:val, propName:'' };
    d.variables.push(v); td.classList.add('picked'); td.dataset.key=v.key; refreshVarList();
    selectVariableInList(v.key);
  }else{
    selectVariableInList(d.variables[i].key);
  }
}
/* ---- 右の変数一覧側で編集を始めたとき、左の文書プレビュー側でも対応するマスクが分かるようにする ---- */
function highlightPreviewForVar(key){

/* ---- プレビュー内のマスク／マスク済みセルをクリック → 右の一覧で該当項目を選択し、すぐ編集できるようにする ---- */
function selectVariableInList(key){
  const d=state.draft;
  d.selectedVarKey=key;
  document.querySelectorAll('#previewBody .mask, #previewBody td.picked').forEach(el=>{
    el.classList.toggle('mask-selected', el.dataset.key===key);
  });

    if(inp){ inp.focus(); inp.select(); }

  }
  // 通常項目として見つからない場合：繰り返し行グループのメンバーである可能性を確認する。
  // トグルが閉じていても自動では開かず、グループのカードまでスクロール／ハイライトするだけにとどめる。
  const v=d.variables.find(x=>x.key===key);
  if(v && v.repeatGroupId){

    if(card){
      card.classList.add('selected');
      card.scrollIntoView({block:'nearest', behavior:'smooth'});
      // すでに開いている場合は、該当メンバーの入力欄まで直接フォーカスする
      const memberInput=card.querySelector(`.grp-member-row[data-key="${CSS.escape(key)}"] input[type=text]`);
      if(memberInput){ memberInput.focus(); memberInput.select(); }
    }
  }
}
/* ---- 変数リスト ---- */
function removeVar(key){
  const d=state.draft;
  d.variables=d.variables.filter(v=>v.key!==key);
  if(d.groupSelection) d.groupSelection=d.groupSelection.filter(k=>k!==key);
  if(d.fileType==='docx') renderDocxPreview(document.getElementById('previewBody'));
  else renderXlsxPreview(document.getElementById('previewBody'));
  applyGroupSelectionClassesToPreview();
  refreshVarList();

/* マスクの「文書内での位置」を並び替えキーとして計算する（上から順に並べるため） */
function computeVarSortKey(v){
  const d=state.draft;
  if(v.addr){
    const sheetIdx = (d.workbook ? d.workbook.SheetNames.indexOf(v.sheet) : 0);
    const cell = XLSX.utils.decode_cell(v.addr);
    return sheetIdx*1e8 + cell.r*1e4 + cell.c;
  }
  const body=document.getElementById('previewBody');
  if(!body) return 0;
  const full=previewFullText(body);
  const positions=allIndexOf(full, v.originalText);
  const occ=v.occurrence||0;
  return positions[occ]!=null ? positions[occ] : Number.MAX_SAFE_INTEGER;
}
function refreshVarList(){
  const d=state.draft;
  // 実体（メンバーとなる変数）が1件も無い繰り返し行グループは、表示のたびに自動で取り除く。
  // 何らかの理由でグループ定義だけが残ってしまった「中身が空のグループ」が
  // 一覧に残り続けるのを防ぐための自己修復処理。
  if(d.repeatGroups && d.repeatGroups.length){
    d.repeatGroups=d.repeatGroups.filter(g=>d.variables.some(v=>v.repeatGroupId===g.id));
  }
  document.getElementById('varCount').textContent=d.variables.length;
  const list=document.getElementById('varList');
  if(!d.variables.length){ list.innerHTML='<div class="empty">左側でマスクした部分がここに並びます。</div>'; renderGroupToolbar(); return; }
  list.innerHTML='';
  d.expandedGroups=d.expandedGroups||new Set();

  // 同じ項目名のヒント表示は、グループのメンバーも含めて数える（グループ内外での重複も許容するため）
  const nameCounts={};
  d.variables.forEach(v=>{ const n=v.propName.trim(); if(n) nameCounts[n]=(nameCounts[n]||0)+1; });

  // グループの「位置」は、先頭メンバー（anchorKey。無ければグループ内の最初に見つかった変数）を基準にする
  function groupAnchorVar(g){
    if(g.anchorKey){ const v=d.variables.find(x=>x.key===g.anchorKey); if(v) return v; }
    return d.variables.find(x=>x.repeatGroupId===g.id) || null;
  }

  const ungrouped=d.variables.filter(v=>!v.repeatGroupId);
  const items=[
    ...ungrouped.map(v=>({ type:'var', v, sortKey:computeVarSortKey(v) })),
    ...(d.repeatGroups||[]).map(g=>{
      const anchor=groupAnchorVar(g);
      return { type:'group', g, sortKey: anchor?computeVarSortKey(anchor):Number.MAX_SAFE_INTEGER };
    })
  ].sort((a,b)=>a.sortKey-b.sortKey);

  items.forEach(it=>{
    if(it.type==='var') list.appendChild(buildVarItemEl(d, it.v, nameCounts));
    else list.appendChild(buildGroupCardEl(d, it.g, nameCounts));
  });

  renderGroupToolbar();
  refreshMaskTitles();
}
/* 「同じ値として結合」した項目のうち、いずれかが繰り返し行のメンバーだった場合に、
   そのグループの memberPropNames にも新しい名前を反映させるためのヘルパー */
function syncGroupMemberName(d, v, oldName, newName){
  if(!v.repeatGroupId) return;
  const g=(d.repeatGroups||[]).find(x=>x.id===v.repeatGroupId);
  if(!g) return;
  const idx=g.memberPropNames.indexOf(oldName);
  if(idx>=0) g.memberPropNames[idx]=newName;
}
/* 項目名を変更する共通処理。
   「同じ値として結合」した項目は、内部的には同じ項目名を持つ複数の独立した変数（別のオブジェクト）
   として保持されているため、1つの入力欄だけで v.propName を書き換えても、結合されている他の
   出現箇所（別の入力欄）には反映されず、名前がずれてしまう不具合があった。
   ここで、変更前の名前を持つ他のすべての変数にも同じ新しい名前を伝播させ、
   （表示中であれば）対応する入力欄のDOM表示もその場で更新する。 */
function renamePropName(d, v, newName){
  const oldName=v.propName;
  if(oldName===newName) return;
  v.propName=newName;
  syncGroupMemberName(d, v, oldName, newName);
  if(oldName.trim()){
    d.variables.forEach(other=>{
      if(other===v || other.propName!==oldName) return;
      other.propName=newName;
      syncGroupMemberName(d, other, oldName, newName);
      const inp=document.querySelector(`#varList [data-key="${CSS.escape(other.key)}"] input[type=text]`);
      if(inp && inp.value!==newName) inp.value=newName;
    });
  }
}
// 「同じ値として結合」を解除する：この1件だけに新しい項目名を付け、他の結合相手には影響させない
// （renamePropNameとは逆に、あえて他の同名項目へは伝播させない一回限りのリネーム）
function unshareVar(d, v){
  const oldName=v.propName;
  const newName=(prompt('この項目だけ結合から外して、独立した項目にします。新しい項目名を入力してください', oldName?oldName+'（別項目）':'')||'').trim();
  if(!newName) return;
  if(newName===oldName){ toast('元の項目名と同じです。別の項目名を入力してください', true); return; }
  v.propName=newName;
  syncGroupMemberName(d, v, oldName, newName);
  refreshVarList();
  toast('この項目を独立させました');
}
// 通常（未グループ）の1項目ぶんのDOM要素を作る
function buildVarItemEl(d, v, nameCounts){
  const item=document.createElement('div'); item.className='var-item'; item.dataset.key=v.key;
  const loc=v.addr?` <span style="color:var(--brand)">[${v.sheet}!${v.addr}]</span>`:'';
  const checked = (d.groupSelection||[]).includes(v.key);
  const shareCount=nameCounts[v.propName.trim()]||0;

function mergeAsSharedValue(keys){
  const d=state.draft;

  const name=(prompt('これらを同じ値として扱います。共通の項目名を入力してください', vars[0].propName||'')||'').trim();
